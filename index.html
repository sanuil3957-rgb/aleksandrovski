<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Александровски — С Пасхой! 🥚✨</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #f5e6d3 0%, #ffe8d4 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* Пасхальные украшения фона */
        body::before {
            content: "🐣";
            position: fixed;
            bottom: 20px;
            left: 10px;
            font-size: 40px;
            opacity: 0.3;
            pointer-events: none;
            animation: bounce 3s infinite;
        }

        body::after {
            content: "🌸";
            position: fixed;
            top: 20px;
            right: 10px;
            font-size: 35px;
            opacity: 0.3;
            pointer-events: none;
            animation: sway 4s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(15deg); }
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 248, 235, 0.95);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
            backdrop-filter: blur(2px);
        }

        /* Пасхальная шапка */
        .header {
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #5a3e2b;
            z-index: 10;
            border-bottom: 3px solid #ffecb3;
            position: relative;
            overflow: hidden;
        }

        .header::before {
            content: "🐰🐣🥚";
            position: absolute;
            right: -20px;
            top: -10px;
            font-size: 50px;
            opacity: 0.15;
            pointer-events: none;
        }

        .header-logo {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.3);
            padding: 5px 12px;
            border-radius: 30px;
        }

        .admin-badge {
            background: #ffd700;
            color: #d2691e;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .online-count {
            font-size: 12px;
            background: rgba(255,255,255,0.3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        /* Пасхальный баннер техработ */
        .maintenance-banner {
            background: linear-gradient(135deg, #ff9a3c, #ff6b35);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: pulse 1s infinite;
            border-bottom: 2px solid #ffecb3;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 24px;
            background: rgba(255, 248, 235, 0.95);
            overflow-y: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            animation: eggWobble 2s infinite;
        }

        @keyframes eggWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #ffd6a5;
            border-radius: 30px;
            font-size: 16px;
            background: white;
            outline: none;
        }

        .input-group input:focus {
            border-color: #f7a1c4;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            color: #5a3e2b;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-danger {
            background: linear-gradient(135deg, #ff9a3c, #ff6b35);
            color: white;
        }

        .switch-auth {
            text-align: center;
            margin-top: 24px;
            color: #a0522d;
        }

        .switch-auth span {
            color: #d2691e;
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            color: #dc3545;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
        }

        .bottom-nav {
            background: rgba(255, 248, 235, 0.98);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 16px;
            border-top: 2px solid #ffd6a5;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #a0522d;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-item.active {
            color: #f7a1c4;
        }

        .nav-icon {
            font-size: 22px;
        }

        .page {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .page.active-page {
            display: block;
        }

        /* Пасхальные яйца вместо аватаров */
        .story-avatar, .user-avatar, .profile-avatar, .card-avatar {
            background: linear-gradient(135deg, #ffd6a5, #f7a1c4) !important;
            position: relative;
            overflow: hidden;
        }

        .story-avatar::after, .user-avatar::after, .profile-avatar::after {
            content: "🥚";
            position: absolute;
            font-size: 20px;
            opacity: 0.3;
            bottom: 0;
            right: 0;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .admin-card {
            background: linear-gradient(135deg, white, #fff8f0);
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            transition: 0.2s;
            border: 1px solid #ffd6a5;
        }

        .admin-card:active { transform: scale(0.97); }
        .admin-card .emoji { font-size: 32px; margin-bottom: 8px; }
        .admin-card .title { font-weight: 600; font-size: 14px; }
        .admin-card .desc { font-size: 11px; color: #888; margin-top: 4px; }

        .stories-row {
            background: rgba(255, 248, 235, 0.9);
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #ffd6a5;
        }

        .story-circle {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            border: 3px solid #ffd700;
            background-size: cover;
            background-position: center;
        }

        .story-avatar.add {
            background: #f0f2f5 !important;
            border: 2px dashed #f7a1c4;
            color: #f7a1c4;
        }

        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .story-media {
            width: 100%;
            max-height: 80%;
            object-fit: contain;
        }

        .story-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 28px;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
        }

        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .story-modal button {
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            color: #5a3e2b;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            width: 250px;
            cursor: pointer;
        }

        .users-list {
            padding: 8px 0;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 14px;
            background: rgba(255, 248, 235, 0.9);
            margin: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #ffd6a5;
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 700;
            font-size: 16px;
            color: #5a3e2b;
        }

        .user-status {
            font-size: 12px;
            color: #888;
        }

        .chat-window {
            display: none;
            flex-direction: column;
            height: 100%;
            background: rgba(255, 248, 235, 0.98);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.incoming { align-self: flex-start; }
        .message.outgoing { align-self: flex-end; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

        .incoming .bubble {
            background: white;
            border: 1px solid #ffd6a5;
        }
        .outgoing .bubble {
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            color: #5a3e2b;
        }

        .input-container {
            background: rgba(255, 248, 235, 0.95);
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #ffd6a5;
        }

        .input-container input {
            flex: 1;
            padding: 12px;
            border: 2px solid #ffd6a5;
            background: white;
            border-radius: 30px;
            outline: none;
        }

        .profile-header {
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            padding: 32px 20px;
            text-align: center;
            color: #5a3e2b;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .feed-card {
            background: rgba(255, 248, 235, 0.95);
            margin: 12px 16px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #ffd6a5;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
        }

        .card-content {
            padding: 0 12px 12px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #f7a1c4, #ffd6a5);
            color: #5a3e2b;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 2000;
            animation: fadeOut 2s forwards;
            font-weight: 500;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translateY(20px); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0522d;
        }

        /* Пасхальный стикер-пак */
        .easter-sticker {
            display: inline-block;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }

        .easter-sticker:hover {
            transform: scale(1.2);
        }

        .sticker-panel {
            background: rgba(255, 248, 235, 0.95);
            border-radius: 20px;
            padding: 10px;
            margin-top: 5px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #ffd6a5;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-logo">
            <span>🐰</span> Александровски
            <span class="admin-badge" id="adminBadge" style="display:none;">ADMIN</span>
        </div>
        <div class="online-count" id="onlineCount">👥 0 онлайн</div>
    </div>

    <div id="maintenanceBanner" class="maintenance-banner">
        🥚🔧 ПАСХАЛЬНЫЕ ТЕХРАБОТЫ 🔧🥚<br>
        Публикация временно недоступна
    </div>

    <div id="authContainer" class="auth-container">
        <div class="logo">
            <div class="logo-icon">🐣</div>
            <h2 style="color: #d2691e;">Александровски</h2>
            <p style="color: #a0522d; margin-top: 8px;">🐰 С ПАСХОЙ! 🥚</p>
        </div>
        <div id="loginForm">
            <div class="input-group"><input type="text" id="loginUsername" placeholder="Логин" value="alex"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль" value="admin123"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMeLogin">
                <label>🔐 Запомнить меня на этом устройстве</label>
            </div>
            <button class="btn" id="doLoginBtn">🥚 Войти 🐣</button>
            <div class="switch-auth">Нет аккаунта? <span id="showRegisterBtn">Зарегистрироваться</span></div>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="registerForm" style="display:none">
            <div class="input-group"><input type="text" id="regFullname" placeholder="Имя и фамилия"></div>
            <div class="input-group"><input type="text" id="regLogin" placeholder="Логин"></div>
            <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div class="input-group"><textarea id="regBio" placeholder="О себе" rows="2"></textarea></div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMeReg">
                <label>🔐 Запомнить меня на этом устройстве</label>
            </div>
            <button class="btn" id="doRegisterBtn">🐣 Зарегистрироваться 🥚</button>
            <div class="switch-auth">Уже есть аккаунт? <span id="showLoginBtn">Войти</span></div>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <div id="mainApp" style="display:none; flex-direction: column; height: 100%;">
        <div id="feedPage" class="page active-page">
            <div class="stories-row" id="storiesRow"></div>
            <div id="feedContainer"></div>
        </div>
        <div id="messagesPage" class="page">
            <div id="usersListContainer" class="users-list"></div>
        </div>
        <div id="adminPage" class="page">
            <div class="admin-grid" id="adminGrid"></div>
        </div>
        <div id="profilePage" class="page">
            <div id="profileContent"></div>
            <div style="padding: 16px;"><button id="logoutBtn" class="btn btn-danger">🐰 Выйти 🐣</button></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span><span>Лента</span></button>
            <button class="nav-item" data-page="messages"><span class="nav-icon">💬</span><span>Люди</span></button>
            <button class="nav-item" data-page="admin" id="adminNavBtn" style="display:none;"><span class="nav-icon">⚙️</span><span>Админ</span></button>
            <button class="nav-item" data-page="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
        </div>
    </div>

    <div id="chatWindow" class="chat-window">
        <div class="header" style="background: linear-gradient(135deg, #f7a1c4, #ffd6a5);">
            <button id="closeChatBtn" style="background:none; border:none; color:#5a3e2b; font-size:28px;">←</button>
            <div style="flex:1"><span id="chatWindowTitle">Чат</span></div>
            <button id="showStickersBtn" style="background:none; border:none; font-size:24px; cursor:pointer;">🐣</button>
        </div>
        <div id="chatMessagesArea" class="messages-area"></div>
        <div id="stickerPanel" class="sticker-panel" style="display:none;">
            <span class="easter-sticker" data-sticker="🥚">🥚</span>
            <span class="easter-sticker" data-sticker="🐣">🐣</span>
            <span class="easter-sticker" data-sticker="🐰">🐰</span>
            <span class="easter-sticker" data-sticker="🌸">🌸</span>
            <span class="easter-sticker" data-sticker="🌷">🌷</span>
            <span class="easter-sticker" data-sticker="🐥">🐥</span>
            <span class="easter-sticker" data-sticker="💐">💐</span>
            <span class="easter-sticker" data-sticker="✨">✨</span>
        </div>
        <div class="input-container">
            <input type="text" id="chatMessageInput" placeholder="Сообщение...">
            <button id="sendChatBtn" style="background: linear-gradient(135deg, #f7a1c4, #ffd6a5); border:none; width:44px; border-radius:50%; color:#5a3e2b;">➤</button>
        </div>
    </div>

    <div id="storyViewer" class="story-viewer">
        <button class="story-close" id="closeStoryBtn">✕</button>
        <img id="storyImageView" class="story-media" style="display:none;">
        <video id="storyVideoView" class="story-media" style="display:none;" controls autoplay></video>
        <div id="storyTextView" class="story-text"></div>
    </div>

    <div id="storyModal" class="story-modal">
        <button id="selectPhotoBtn">📷 Выбрать фото с пасхальной рамкой</button>
        <button id="selectVideoBtn">🎥 Выбрать видео</button>
        <button id="selectTextBtn">📝 Пасхальное поздравление</button>
        <button id="cancelStoryBtn" style="background:#555;">Отмена</button>
        <input type="file" id="photoStoryInput" accept="image/*" style="display:none">
        <input type="file" id="videoStoryInput" accept="video/*" style="display:none">
    </div>
</div>

<script>
    // ========== ПАСХАЛЬНЫЕ СТИКЕРЫ ==========
    let platformData = {
        users: [],
        posts: [],
        stories: [],
        privateMessages: {},
        bannedUsers: [],
        maintenanceMode: false
    };

    let currentUser = null;
    let deviceId = null;

    function getDeviceId() {
        let id = localStorage.getItem('device_unique_id');
        if (!id) {
            id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('device_unique_id', id);
        }
        return id;
    }

    function loadData() {
        const saved = localStorage.getItem('alexandrovski_data_easter');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                platformData = parsed;
            } catch(e) { console.log("Ошибка загрузки"); }
        }
        
        if (platformData.users.length === 0) {
            platformData.users = [{
                id: "admin_alex",
                fullname: "Александр Епифанов 🐰",
                login: "alex",
                password: "admin123",
                bio: "Создатель Александровски | С Пасхой! 🥚",
                avatar: "🐣",
                isAdmin: true,
                isOnline: false,
                lastSeen: new Date().toISOString(),
                deviceId: null
            }];
        }
        
        platformData.users.forEach(user => {
            if (user.isOnline === undefined) user.isOnline = false;
            if (!user.lastSeen) user.lastSeen = new Date().toISOString();
            if (!user.avatar) user.avatar = "🥚";
            if (user.deviceId === undefined) user.deviceId = null;
        });
        
        if (!platformData.posts) platformData.posts = [];
        if (!platformData.stories) platformData.stories = [];
        if (!platformData.privateMessages) platformData.privateMessages = {};
        if (!platformData.bannedUsers) platformData.bannedUsers = [];
        if (platformData.maintenanceMode === undefined) platformData.maintenanceMode = false;
        
        saveData();
        updateMaintenanceUI();
    }

    function saveData() {
        localStorage.setItem('alexandrovski_data_easter', JSON.stringify(platformData));
    }

    function saveSession(userId, remember) {
        const sessionData = { userId: userId, deviceId: deviceId, timestamp: Date.now() };
        if (remember) {
            localStorage.setItem('alexandrovski_session_easter', JSON.stringify(sessionData));
        } else {
            sessionStorage.setItem('alexandrovski_session_easter', JSON.stringify(sessionData));
        }
    }

    function getSessionUserId() {
        let sessionStr = sessionStorage.getItem('alexandrovski_session_easter');
        if (sessionStr) {
            try {
                const session = JSON.parse(sessionStr);
                if (session.deviceId === deviceId) return session.userId;
            } catch(e) {}
        }
        sessionStr = localStorage.getItem('alexandrovski_session_easter');
        if (sessionStr) {
            try {
                const session = JSON.parse(sessionStr);
                if (session.deviceId === deviceId) return session.userId;
            } catch(e) {}
        }
        return null;
    }

    function clearSession() {
        sessionStorage.removeItem('alexandrovski_session_easter');
        localStorage.removeItem('alexandrovski_session_easter');
    }

    function checkAutoLogin() {
        const userId = getSessionUserId();
        if (userId) {
            const user = platformData.users.find(u => u.id === userId);
            if (user) {
                if (user.deviceId && user.deviceId !== deviceId) {
                    showToast("🥚 Этот аккаунт уже используется на другом устройстве");
                    clearSession();
                    return false;
                }
                currentUser = user;
                currentUser.isOnline = true;
                currentUser.lastSeen = new Date().toISOString();
                saveData();
                showMainApp();
                return true;
            }
        }
        return false;
    }

    function updateMaintenanceUI() {
        const banner = document.getElementById('maintenanceBanner');
        if (platformData.maintenanceMode) {
            banner.style.display = 'block';
            const msgInput = document.getElementById('chatMessageInput');
            if (msgInput) msgInput.disabled = true;
        } else {
            banner.style.display = 'none';
            const msgInput = document.getElementById('chatMessageInput');
            if (msgInput) msgInput.disabled = false;
        }
        if (currentUser?.isAdmin && document.getElementById('adminPage').classList.contains('active-page')) renderAdminPanel();
        if (document.getElementById('profilePage').classList.contains('active-page')) renderProfile();
    }

    function toggleMaintenance() {
        platformData.maintenanceMode = !platformData.maintenanceMode;
        saveData();
        updateMaintenanceUI();
        showToast(platformData.maintenanceMode ? "🥚 Пасхальные техработы ВКЛЮЧЕНЫ 🐣" : "🐰 Пасхальные техработы ВЫКЛЮЧЕНЫ 🌸");
        if (document.getElementById('adminPage').classList.contains('active-page')) renderAdminPanel();
        if (document.getElementById('profilePage').classList.contains('active-page')) renderProfile();
    }

    function checkMaintenance(actionName) {
        if (platformData.maintenanceMode) {
            showToast(`🥚 Пасхальные работы! ${actionName} временно недоступно 🐣`);
            return false;
        }
        return true;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

    function formatTimeAgo(dateStr) {
        if (!dateStr) return "давно";
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000 / 60);
        if (diff < 1) return "только что";
        if (diff < 60) return `${diff} мин назад`;
        if (diff < 1440) return `${Math.floor(diff / 60)} ч назад`;
        return `${Math.floor(diff / 1440)} дн назад`;
    }

    function updateOnlineCount() {
        const onlineCount = platformData.users.filter(u => u.isOnline && u.id !== currentUser?.id).length;
        const countSpan = document.getElementById('onlineCount');
        if (countSpan) countSpan.innerHTML = `🐣 ${onlineCount} онлайн`;
    }

    function register() {
        const fullname = document.getElementById('regFullname').value.trim();
        const login = document.getElementById('regLogin').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const bio = document.getElementById('regBio').value.trim();
        const rememberMe = document.getElementById('rememberMeReg').checked;
        const errorSpan = document.getElementById('regError');

        if (!fullname || !login || !password) {
            errorSpan.innerText = 'Заполните все поля';
            return;
        }
        if (platformData.users.find(u => u.login === login)) {
            errorSpan.innerText = 'Логин уже занят';
            return;
        }
        
        const newUser = {
            id: 'user_' + Date.now(),
            fullname: fullname + " 🐣",
            login: login,
            password: password,
            bio: bio || "С Пасхой! 🥚",
            avatar: "🐰",
            isAdmin: false,
            isOnline: true,
            lastSeen: new Date().toISOString(),
            deviceId: deviceId
        };
        platformData.users.push(newUser);
        saveData();
        
        currentUser = newUser;
        saveSession(currentUser.id, rememberMe);
        showMainApp();
    }

    function login() {
        const loginVal = document.getElementById('loginUsername').value.trim();
        const passwordVal = document.getElementById('loginPassword').value.trim();
        const rememberMe = document.getElementById('rememberMeLogin').checked;
        const errorSpan = document.getElementById('loginError');
        
        const user = platformData.users.find(u => u.login === loginVal && u.password === passwordVal);
        if (!user) {
            errorSpan.innerText = 'Неверный логин или пароль';
            return;
        }
        
        if (user.deviceId && user.deviceId !== deviceId) {
            errorSpan.innerText = 'Этот аккаунт уже используется на другом устройстве';
            return;
        }
        
        user.deviceId = deviceId;
        currentUser = user;
        currentUser.isOnline = true;
        currentUser.lastSeen = new Date().toISOString();
        saveData();
        saveSession(currentUser.id, rememberMe);
        showMainApp();
    }

    function logout() {
        if (currentUser) {
            currentUser.isOnline = false;
            currentUser.lastSeen = new Date().toISOString();
            saveData();
        }
        clearSession();
        currentUser = null;
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        showToast("🐰 Вы вышли из аккаунта. С Пасхой! 🥚");
    }

    function showMainApp() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        
        if (currentUser.isAdmin) {
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('adminNavBtn').style.display = 'flex';
        } else {
            document.getElementById('adminBadge').style.display = 'none';
            document.getElementById('adminNavBtn').style.display = 'none';
        }
        
        updateOnlineCount();
        renderFeed();
        renderStories();
        renderUsersList();
        renderProfile();
        if (currentUser.isAdmin) renderAdminPanel();
        updateMaintenanceUI();
        switchPage('feed');
    }

    function renderFeed() {
        const container = document.getElementById('feedContainer');
        const filteredPosts = platformData.posts.filter(p => !platformData.bannedUsers.includes(p.userId));
        const sorted = [...filteredPosts].reverse();
        
        if (sorted.length === 0) {
            container.innerHTML = '<div class="empty-state">🐣 Нет постов. Напишите пасхальное поздравление! 🥚</div>';
            return;
        }
        
        container.innerHTML = sorted.map(post => {
            const author = platformData.users.find(u => u.id === post.userId);
            const authorName = author ? author.fullname : "Пользователь";
            const authorAvatar = author ? author.avatar : "🥚";
            return `
                <div class="feed-card">
                    <div class="card-header">
                        <div class="user-avatar" style="width:44px; height:44px; font-size:18px; display:flex; align-items:center; justify-content:center;">${authorAvatar}</div>
                        <div><strong>${escapeHtml(authorName)}</strong><br><span style="font-size:11px; color:#aaa;">${new Date(post.time).toLocaleString()}</span></div>
                    </div>
                    <div class="card-content">${escapeHtml(post.text)}</div>
                    <div style="padding: 12px; border-top:1px solid #ffd6a5;">❤️ ${post.likes}</div>
                </div>
            `;
        }).join('');
    }

    function renderStories() {
        const container = document.getElementById('storiesRow');
        const validStories = platformData.stories.filter(s => s && s.data);
        
        const storiesHtml = validStories.map((story, idx) => {
            const author = platformData.users.find(u => u.id === story.userId);
            const authorName = author ? author.fullname.slice(0,2) : "🐣";
            return `
                <div class="story-circle" onclick="viewStory(${idx})">
                    <div class="story-avatar" style="background-image: url('${story.mediaType === 'image' ? story.data : ''}'); background-size: cover; display:flex; align-items:center; justify-content:center;">
                        ${story.mediaType === 'image' ? '' : (story.mediaType === 'video' ? '🎥' : '📝')}
                    </div>
                    <span class="story-name">${authorName}</span>
                </div>
            `;
        }).join('');
        
        container.innerHTML = `
            <div class="story-circle" id="addStoryCircle">
                <div class="story-avatar add" style="display:flex; align-items:center; justify-content:center;">+</div>
                <span class="story-name">Моя история</span>
            </div>
            ${storiesHtml}
        `;
        
        const addBtn = document.getElementById('addStoryCircle');
        if (addBtn) {
            addBtn.onclick = () => {
                if (!checkMaintenance("добавление историй")) return;
                document.getElementById('storyModal').style.display = 'flex';
            };
        }
    }

    window.viewStory = function(idx) {
        const story = platformData.stories[idx];
        if (!story || !story.data) { showToast("История недоступна"); return; }
        const viewer = document.getElementById('storyViewer');
        const imgView = document.getElementById('storyImageView');
        const videoView = document.getElementById('storyVideoView');
        const textView = document.getElementById('storyTextView');
        
        imgView.style.display = 'none';
        videoView.style.display = 'none';
        if (videoView) videoView.pause();
        
        if (story.mediaType === 'image') {
            imgView.src = story.data;
            imgView.style.display = 'block';
        } else if (story.mediaType === 'video') {
            videoView.src = story.data;
            videoView.style.display = 'block';
            videoView.play().catch(e => console.log);
        } else {
            textView.innerText = story.text || '';
        }
        
        viewer.style.display = 'flex';
        if (window.storyTimeout) clearTimeout(window.storyTimeout);
        window.storyTimeout = setTimeout(() => {
            viewer.style.display = 'none';
            if (videoView) videoView.pause();
        }, 10000);
    };

    function addStory(mediaType, data, text = '') {
        if (!checkMaintenance("добавление историй")) return;
        const newStory = {
            id: Date.now(),
            userId: currentUser.id,
            mediaType: mediaType,
            data: data,
            text: text,
            time: new Date().toISOString()
        };
        platformData.stories.unshift(newStory);
        if (platformData.stories.length > 20) platformData.stories.pop();
        saveData();
        renderStories();
        showToast("🥚 Пасхальная история добавлена! 🐣");
    }

    function renderUsersList() {
        const container = document.getElementById('usersListContainer');
        const otherUsers = platformData.users.filter(u => u.id !== currentUser.id && !platformData.bannedUsers.includes(u.id));
        
        if (otherUsers.length === 0) {
            container.innerHTML = `<div class="empty-state">🐣 Пока нет других пользователей<br>Пригласите друзей отметить Пасху! 🥚</div>`;
            return;
        }
        
        container.innerHTML = otherUsers.map(user => `
            <div class="user-item" data-user-id="${user.id}">
                <div class="user-avatar" style="display:flex; align-items:center; justify-content:center;">${user.avatar || "🥚"}</div>
                <div class="user-info">
                    <div class="user-name">${escapeHtml(user.fullname)}</div>
                    <div class="user-status">${user.isOnline ? '🟢 онлайн 🐣' : '⚫ был(а) ' + formatTimeAgo(user.lastSeen)}</div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.userId));
        });
    }

    function getChatKey(u1, u2) { return [u1, u2].sort().join('_'); }
    
    function openChat(userId) {
        const user = platformData.users.find(u => u.id === userId);
        if (!user) return;
        document.getElementById('chatWindowTitle').innerHTML = `${escapeHtml(user.fullname)} ${user.isOnline ? '🐣' : '🥚'}`;
        document.getElementById('chatWindow').style.display = 'flex';
        window.currentChatPartner = user;
        renderChatMessages(userId);
        updateMaintenanceUI();
        markMessagesAsRead(userId);
    }
    
    function renderChatMessages(otherId) {
        const key = getChatKey(currentUser.id, otherId);
        const msgs = platformData.privateMessages[key] || [];
        const container = document.getElementById('chatMessagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">🐰 Напишите пасхальное поздравление! 🥚</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.senderId === currentUser.id ? 'outgoing' : 'incoming'}">
                <div class="bubble">
                    ${escapeHtml(msg.text)}
                    <div style="font-size:10px; opacity:0.7; margin-top:4px;">
                        ${new Date(msg.time).toLocaleTimeString()}
                    </div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function markMessagesAsRead(otherId) {
        const key = getChatKey(currentUser.id, otherId);
        if (platformData.privateMessages[key]) {
            let updated = false;
            platformData.privateMessages[key].forEach(msg => {
                if (msg.senderId !== currentUser.id && !msg.read) {
                    msg.read = true;
                    updated = true;
                }
            });
            if (updated) {
                saveData();
                renderChatMessages(otherId);
            }
        }
    }
    
    function sendMessage(otherId, text) {
        if (!checkMaintenance("отправка сообщений")) return;
        if (!text.trim()) return;
        
        const key = getChatKey(currentUser.id, otherId);
        if (!platformData.privateMessages[key]) platformData.privateMessages[key] = [];
        
        platformData.privateMessages[key].push({
            id: Date.now(),
            senderId: currentUser.id,
            text: text.trim(),
            time: new Date().toISOString(),
            read: false
        });
        
        saveData();
        renderChatMessages(otherId);
        
        const receiver = platformData.users.find(u => u.id === otherId);
        showToast(`🐣 Пасхальное сообщение отправлено ${receiver?.fullname} 🥚`);
        
        document.getElementById('chatMessageInput').value = '';
    }

        document.getElementById('profileContent').innerHTML = `

    const adminFunctions = [
        { emoji: "🔧🥚", name: "ПАСХАЛЬНЫЕ ТЕХРАБОТЫ", desc: platformData.maintenanceMode ? "🔴 ВЫКЛЮЧИТЬ" : "🟢 ВКЛЮЧИТЬ", action: toggleMaintenance },
        { emoji: "🐣", name: "Все пользователи", desc: "Список всех", action: () => showToast(`Пользователей: ${platformData.users.length}\n${platformData.users.map(u=>u.fullname).join(', ')}`) },

        { emoji: "🔓🐣", name: "Разблокировать", desc: "Снять блок", action: () => { if(platformData.bannedUsers.length){ platformData.bannedUsers.pop(); saveData(); showToast("Разблокирован"); renderUsersList();} else showToast("Нет заблокированных"); } },
        { emoji: "📝🐰", name: "Создать пост", desc: "Пасхальное поздравление", action: () => {

            let text = prompt("Пасхальное поздравление 🥚"); 
            if(text){ platformData.posts.push({id:Date.now(), userId:currentUser.id, text: "🐣 " + text + " 🥚", time:new Date().toISOString(), likes:0}); saveData(); renderFeed(); showToast("Пост создан!"); } 
        } },
        { emoji: "🗑️", name: "Удалить пост", desc: "По ID", action: () => { let id = prompt("ID поста"); let idx = platformData.posts.findIndex(p=>p.id==id); if(idx>=0){ platformData.posts.splice(idx,1); saveData(); renderFeed(); showToast("Удалено"); } } },
        { emoji: "📸", name: "Удалить историю", desc: "Последнюю", action: () => { if(platformData.stories.length){ platformData.stories.shift(); saveData(); renderStories(); showToast("История удалена"); } } },
        { emoji: "✏️", name: "Изменить имя", desc: "Своё имя", action: () => { let n = prompt("Новое имя", currentUser.fullname); if(n){ currentUser.fullname=n + " 🐣"; currentUser.avatar="🐰"; saveData(); renderProfile(); renderFeed(); showToast("Имя изменено"); } } },

                    } 
                }); 
                saveData(); 
                showToast("Отправлено всем! С Пасхой!"); 
            } 
        } },
        { emoji: "🎁", name: "Бонус всем", desc: "+100 лайков", action: () => { platformData.posts.forEach(p=>p.likes+=100); saveData(); renderFeed(); showToast("Пасхальный бонус начислен!"); } },
        { emoji: "📊", name: "Статистика", desc: "Полный отчёт", action: () => { showToast(`📊 Постов:${platformData.posts.length} Историй:${platformData.stories.length} Юзеров:${platformData.users.length} Техработы:${platformData.maintenanceMode?"ВКЛ":"ВЫКЛ"} 🐣`); } }
    ];

                <div class="emoji">${f.emoji}</div>

            </div>
        `).join('');

    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`${pageId}Page`).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        const targetBtn = document.querySelector(`[data-page="${pageId}"]`);

        if (pageId === 'messages') renderUsersList();

    document.getElementById('sendChatBtn')?.addEventListener('click', () => {

            reader.onload = (ev) => { addStory('image', ev.target.result, ''); document.getElementById('storyModal').style.display = 'none'; };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById('videoStoryInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { addStory('video', ev.target.result, ''); document.getElementById('storyModal').style.display = 'none'; };
            reader.readAsDataURL(file);
        }
    });

    // Запуск
    deviceId = getDeviceId();
    loadData();
    
    setInterval(() => {
        if (currentUser) {
            currentUser.isOnline = true;
            currentUser.lastSeen = new Date().toISOString();
            saveData();
            updateOnlineCount();
            if (document.getElementById('messagesPage').classList.contains('active-page')) renderUsersList();
            if (document.getElementById('profilePage').classList.contains('active-page')) renderProfile();
        }
    }, 30000);
    
    if (!checkAutoLogin()) {
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    }
</script>
</body>
</html>
