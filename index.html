<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Александровски — Админ-панель с режимом техработ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #e8ecf4;
            height: 100vh;
            overflow: hidden;
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            background: #f0f4fa;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: #1a5cff;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: white;
            box-shadow: 0 4px 20px rgba(26,92,255,0.2);
            z-index: 10;
        }

        .header-logo {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .admin-badge {
            background: gold;
            color: #1a5cff;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        /* Баннер техработ */
        .maintenance-banner {
            background: #ff3b30;
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            font-weight: 500;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0% { opacity: 0.8; }
            50% { opacity: 1; }
            100% { opacity: 0.8; }
        }

        .bottom-nav {
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(20px);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 16px;
            border-top: 1px solid rgba(0,0,0,0.05);
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #8e8e9e;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-item.active {
            color: #1a5cff;
        }

        .nav-icon {
            font-size: 22px;
        }

        .page {
            flex: 1;
            overflow-y: auto;
            display: none;
            padding: 0 0 8px 0;
        }

        .page.active-page {
            display: block;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        .admin-card:active { transform: scale(0.97); }
        .admin-card .emoji { font-size: 32px; margin-bottom: 8px; }
        .admin-card .title { font-weight: 600; font-size: 14px; }
        .admin-card .desc { font-size: 11px; color: #888; margin-top: 4px; }

        .stories-row {
            background: white;
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #eff3f8;
        }

        .story-circle {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a5cff, #6c8eff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            border: 3px solid white;
            box-shadow: 0 4px 12px rgba(26,92,255,0.3);
            background-size: cover;
            background-position: center;
        }

        .story-avatar.add {
            background: #f0f2f5;
            border: 2px dashed #1a5cff;
            color: #1a5cff;
        }

        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .story-media {
            width: 100%;
            max-height: 80%;
            object-fit: contain;
        }

        .story-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 28px;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
        }

        .story-text {
            position: absolute;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            padding: 12px;
            border-radius: 20px;
            text-align: center;
            color: white;
        }

        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .story-modal button {
            background: #1a5cff;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            width: 250px;
            cursor: pointer;
        }

        .chat-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 14px;
            background: white;
            margin: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
        }

        .avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1a5cff, #6c8eff);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .chat-window {
            display: none;
            flex-direction: column;
            height: 100%;
            background: #f8fafd;
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.incoming { align-self: flex-start; }
        .message.outgoing { align-self: flex-end; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
        }

        .incoming .bubble {
            background: white;
            border: 1px solid #e2e8f0;
        }
        .outgoing .bubble {
            background: #1a5cff;
            color: white;
        }

        .input-container {
            background: white;
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eff3f8;
        }

        .input-container input {
            flex: 1;
            padding: 12px;
            border: none;
            background: #f0f4fa;
            border-radius: 30px;
            outline: none;
        }

        .input-container input:disabled {
            background: #e0e0e0;
            color: #999;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .profile-header {
            background: linear-gradient(135deg, #1a5cff, #4a7cff);
            padding: 32px 20px;
            text-align: center;
            color: white;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #1a5cff;
        }

        .feed-card {
            background: white;
            margin: 12px 16px;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.04);
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
        }

        .card-content {
            padding: 0 12px 12px;
        }

        .card-media {
            width: 100%;
            max-height: 250px;
            object-fit: cover;
            margin-top: 8px;
            border-radius: 16px;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: #1a5cff;
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 2000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; }
        }

        .disabled-block {
            pointer-events: none;
            opacity: 0.6;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-logo">
            <span>✨</span> Александровски
            <span class="admin-badge" id="adminBadge">ADMIN</span>
        </div>
        <div style="font-size: 12px;" id="statsBadge"></div>
    </div>

    <!-- Баннер технических работ -->
    <div id="maintenanceBanner" class="maintenance-banner">
        🔧 РЕЖИМ ТЕХНИЧЕСКИХ РАБОТ 🔧<br>
        Публикация постов, историй и отправка сообщений временно недоступны
    </div>

    <div id="feedPage" class="page active-page">
        <div class="stories-row" id="storiesRow"></div>
        <div id="feedContainer"></div>
    </div>

    <div id="messagesPage" class="page">
        <div id="usersListContainer"></div>
    </div>

    <div id="adminPage" class="page">
        <div class="admin-grid" id="adminGrid"></div>
    </div>

    <div id="profilePage" class="page">
        <div id="profileContent"></div>
        <div style="padding: 16px;"><button id="logoutBtn" style="width:100%; background:#1a5cff; border:none; padding:14px; border-radius:30px; color:white;">Выйти</button></div>
    </div>

    <div class="bottom-nav">
        <button class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span><span>Лента</span></button>
        <button class="nav-item" data-page="messages"><span class="nav-icon">💬</span><span>Чаты</span></button>
        <button class="nav-item" data-page="admin"><span class="nav-icon">⚙️</span><span>Админ</span></button>
        <button class="nav-item" data-page="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
    </div>

    <!-- Окно чата -->
    <div id="chatWindow" class="chat-window">
        <div class="header" style="background:#1a5cff">
            <button id="closeChatBtn" style="background:none; border:none; color:white; font-size:28px;">←</button>
            <div style="flex:1"><span id="chatWindowTitle">Чат</span></div>
        </div>
        <div id="chatMessagesArea" class="messages-area"></div>
        <div class="input-container">
            <input type="text" id="chatMessageInput" placeholder="Сообщение...">
            <button id="sendChatBtn" style="background:#1a5cff; border:none; width:44px; border-radius:50%; color:white;">➤</button>
        </div>
    </div>

    <!-- Просмотр истории -->
    <div id="storyViewer" class="story-viewer">
        <button class="story-close" id="closeStoryBtn">✕</button>
        <img id="storyImageView" class="story-media" style="display:none;">
        <video id="storyVideoView" class="story-media" style="display:none;" controls autoplay></video>
        <div id="storyTextView" class="story-text"></div>
    </div>

    <!-- Модалка добавления истории -->
    <div id="storyModal" class="story-modal">
        <button id="selectPhotoBtn">📷 Выбрать фото</button>
        <button id="selectVideoBtn">🎥 Выбрать видео</button>
        <button id="selectTextBtn">📝 Текстовая история</button>
        <button id="cancelStoryBtn" style="background:#555;">Отмена</button>
        <input type="file" id="photoStoryInput" accept="image/*" style="display:none">
        <input type="file" id="videoStoryInput" accept="video/*" style="display:none">
    </div>
</div>

<script>
    // ========== ДАННЫЕ ==========
    let currentUser = {
        id: "alex_epifanov",
        fullname: "Александр Епифанов",
        avatar: "АЕ",
        bio: "Создатель Александровски | Администратор",
        isAdmin: true
    };

    let otherUsers = [
        { id: "friend1", fullname: "Дмитрий Кузнецов", avatar: "ДК", online: true, blocked: false },
        { id: "friend2", fullname: "Екатерина Волкова", avatar: "ЕВ", online: true, blocked: false },
        { id: "friend3", fullname: "Максим Соколов", avatar: "МС", online: false, blocked: false },
        { id: "friend4", fullname: "Анна Морозова", avatar: "АМ", online: true, blocked: false },
        { id: "friend5", fullname: "Сергей Васильев", avatar: "СВ", online: false, blocked: false }
    ];

    let posts = [
        { id: "p1", userId: "alex_epifanov", text: "Добро пожаловать в Александровски! 🚀", image: null, video: null, time: new Date().toISOString(), likes: 156 }
    ];

    let stories = [];
    let privateMessages = {};
    let bannedUsers = [];
    let reportedPosts = [];
    
    // РЕЖИМ ТЕХНИЧЕСКИХ РАБОТ (по умолчанию выключен)
    let maintenanceMode = false;

    // ========== ЗАГРУЗКА/СОХРАНЕНИЕ ==========
    function loadData() {
        const saved = localStorage.getItem('alex_admin_data_v2');
        if (saved) {
            const data = JSON.parse(saved);
            stories = data.stories || [];
            posts = data.posts || posts;
            otherUsers = data.otherUsers || otherUsers;
            bannedUsers = data.bannedUsers || [];
            reportedPosts = data.reportedPosts || [];
            maintenanceMode = data.maintenanceMode || false;
            privateMessages = data.privateMessages || {};
        }
        updateMaintenanceUI();
    }

    function saveData() {
        localStorage.setItem('alex_admin_data_v2', JSON.stringify({
            stories, posts, otherUsers, bannedUsers, reportedPosts, maintenanceMode, privateMessages
        }));
    }

    loadData();

    // ========== ОБНОВЛЕНИЕ ИНТЕРФЕЙСА ПРИ РЕЖИМЕ ТЕХРАБОТ ==========
    function updateMaintenanceUI() {
        const banner = document.getElementById('maintenanceBanner');
        if (maintenanceMode) {
            banner.style.display = 'block';
            // Блокируем поля ввода сообщений
            const msgInput = document.getElementById('chatMessageInput');
            const sendBtn = document.getElementById('sendChatBtn');
            if (msgInput) msgInput.disabled = true;
            if (sendBtn) sendBtn.disabled = true;
        } else {
            banner.style.display = 'none';
            const msgInput = document.getElementById('chatMessageInput');
            const sendBtn = document.getElementById('sendChatBtn');
            if (msgInput) msgInput.disabled = false;
            if (sendBtn) sendBtn.disabled = false;
        }
    }

    // Проверка возможности действия
    function checkMaintenance(actionName) {
        if (maintenanceMode) {
            showToast(`🔧 Режим техработ! ${actionName} временно недоступно`);
            return false;
        }
        return true;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

    // ========== ЛЕНТА ==========
    function renderFeed() {
        const container = document.getElementById('feedContainer');
        const filteredPosts = posts.filter(p => !bannedUsers.includes(p.userId));
        const sorted = [...filteredPosts].reverse();
        container.innerHTML = sorted.map(post => {
            const author = post.userId === currentUser.id ? currentUser : otherUsers.find(u => u.id === post.userId);
            const authorName = author ? author.fullname : "Пользователь";
            const authorAvatar = author ? author.avatar : "??";
            return `
                <div class="feed-card">
                    <div class="card-header">
                        <div class="avatar" style="width:44px; height:44px; font-size:18px;">${authorAvatar}</div>
                        <div><strong>${authorName}</strong><br><span style="font-size:11px; color:#aaa;">${new Date(post.time).toLocaleString()}</span></div>
                    </div>
                    <div class="card-content">${escapeHtml(post.text)}</div>
                    ${post.image ? `<img src="${post.image}" class="card-media">` : ''}
                    ${post.video ? `<video src="${post.video}" controls class="card-media"></video>` : ''}
                    <div style="padding: 12px; border-top:1px solid #eff3f8;">❤️ ${post.likes}</div>
                </div>
            `;
        }).join('');
    }

    // ========== ИСТОРИИ ==========
    function renderStories() {
        const container = document.getElementById('storiesRow');
        const validStories = stories.filter(s => s && s.data);
        const storiesHtml = validStories.map((story, idx) => `
            <div class="story-circle" onclick="viewStory(${idx})">
                <div class="story-avatar" style="background-image: url('${story.mediaType === 'image' ? story.data : ''}'); background-size: cover; ${story.mediaType === 'image' ? 'background:none;' : ''}">
                    ${story.mediaType === 'image' ? '' : (story.mediaType === 'video' ? '🎥' : '📝')}
                </div>
                <span class="story-name">${new Date(story.time).toLocaleTimeString().slice(0,5)}</span>
            </div>
        `).join('');
        container.innerHTML = `
            <div class="story-circle" id="addStoryCircle">
                <div class="story-avatar add">+</div>
                <span class="story-name">Моя история</span>
            </div>
            ${storiesHtml}
        `;
        document.getElementById('addStoryCircle')?.addEventListener('click', () => {
            if (!checkMaintenance("добавление историй")) return;
            document.getElementById('storyModal').style.display = 'flex';
        });
    }

    window.viewStory = function(idx) {
        const story = stories[idx];
        if (!story || !story.data) { showToast("История недоступна"); return; }
        const viewer = document.getElementById('storyViewer');
        const imgView = document.getElementById('storyImageView');
        const videoView = document.getElementById('storyVideoView');
        const textView = document.getElementById('storyTextView');
        imgView.style.display = 'none';
        videoView.style.display = 'none';
        videoView.pause();
        if (story.mediaType === 'image') {
            imgView.src = story.data;
            imgView.style.display = 'block';
        } else if (story.mediaType === 'video') {
            videoView.src = story.data;
            videoView.style.display = 'block';
            videoView.play().catch(e => console.log);
        }
        textView.innerText = story.text || '';
        viewer.style.display = 'flex';
        if (window.storyTimeout) clearTimeout(window.storyTimeout);
        window.storyTimeout = setTimeout(() => {
            viewer.style.display = 'none';
            videoView.pause();
        }, 10000);
    };

    function addStory(mediaType, data, text = '') {
        if (!checkMaintenance("добавление историй")) return;
        const newStory = {
            id: Date.now(),
            userId: currentUser.id,
            mediaType: mediaType,
            data: data,
            text: text,
            time: new Date().toISOString()
        };
        stories.unshift(newStory);
        if (stories.length > 20) stories.pop();
        saveData();
        renderStories();
        showToast("История добавлена!");
    }

    document.getElementById('selectPhotoBtn')?.addEventListener('click', () => {
        if (!checkMaintenance("добавление фото")) return;
        document.getElementById('photoStoryInput').click();
    });
    document.getElementById('selectVideoBtn')?.addEventListener('click', () => {
        if (!checkMaintenance("добавление видео")) return;
        document.getElementById('videoStoryInput').click();
    });
    document.getElementById('selectTextBtn')?.addEventListener('click', () => {
        if (!checkMaintenance("добавление текстовой истории")) return;
        const text = prompt("Введите текст истории:");
        if (text) addStory('text', null, text);
        document.getElementById('storyModal').style.display = 'none';
    });
    document.getElementById('photoStoryInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { addStory('image', ev.target.result, ''); document.getElementById('storyModal').style.display = 'none'; };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById('videoStoryInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { addStory('video', ev.target.result, ''); document.getElementById('storyModal').style.display = 'none'; };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById('cancelStoryBtn')?.addEventListener('click', () => document.getElementById('storyModal').style.display = 'none');
    document.getElementById('closeStoryBtn')?.addEventListener('click', () => {
        document.getElementById('storyViewer').style.display = 'none';
        document.getElementById('storyVideoView')?.pause();
    });

    // ========== ЧАТЫ ==========
    function renderUsersList() {
        const container = document.getElementById('usersListContainer');
        const availableUsers = otherUsers.filter(u => !bannedUsers.includes(u.id));
        container.innerHTML = availableUsers.map(user => `
            <div class="chat-item" data-user-id="${user.id}">
                <div class="avatar">${user.avatar}</div>
                <div class="chat-details">
                    <div class="chat-name">${user.fullname}</div>
                    <div style="font-size:12px;">${user.online ? '🟢 онлайн' : '⚫ не в сети'}</div>
                </div>
            </div>
        `).join('');
        document.querySelectorAll('[data-user-id]').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.userId));
        });
    }

    function getChatKey(u1, u2) { return [u1, u2].sort().join('_'); }
    function openChat(userId) {
        const user = otherUsers.find(u => u.id === userId);
        if (!user || user.blocked) { showToast("Пользователь заблокирован"); return; }
        document.getElementById('chatWindowTitle').innerText = user.fullname;
        document.getElementById('chatWindow').style.display = 'flex';
        window.currentChatPartner = user;
        renderChatMessages(userId);
        updateMaintenanceUI(); // обновляем состояние полей ввода
    }
    function renderChatMessages(otherId) {
        const key = getChatKey(currentUser.id, otherId);
        const msgs = privateMessages[key] || [];
        const container = document.getElementById('chatMessagesArea');
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.senderId === currentUser.id ? 'outgoing' : 'incoming'}">
                <div class="bubble">${escapeHtml(msg.text)}<br><span style="font-size:10px;">${new Date(msg.time).toLocaleTimeString()}</span></div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    function sendMessage(otherId, text) {
        if (!checkMaintenance("отправка сообщений")) return;
        if (!text.trim()) return;
        const key = getChatKey(currentUser.id, otherId);
        if (!privateMessages[key]) privateMessages[key] = [];
        privateMessages[key].push({ id: Date.now(), senderId: currentUser.id, text, time: new Date().toISOString() });
        saveData();
        renderChatMessages(otherId);
        setTimeout(() => {
            const replyKey = getChatKey(currentUser.id, otherId);
            const replies = ["👍", "Понял!", "Круто!", "🔥"];
            if (!privateMessages[replyKey]) privateMessages[replyKey] = [];
            privateMessages[replyKey].push({ id: Date.now(), senderId: otherId, text: replies[Math.floor(Math.random()*replies.length)], time: new Date().toISOString() });
            saveData();
            if (window.currentChatPartner?.id === otherId) renderChatMessages(otherId);
        }, 1500);
    }

    // ========== ПРОФИЛЬ ==========
    function renderProfile() {
        document.getElementById('profileContent').innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar">${currentUser.avatar}</div>
                <div style="font-size:24px; font-weight:700;">${currentUser.fullname}</div>
                <div>${currentUser.bio}</div>
                <div style="margin-top:8px;"><span class="admin-badge" style="background:white;">👑 Администратор</span></div>
            </div>
            <div style="background:white; margin:16px; border-radius:24px; padding:16px;">
                <div><strong>📊 Статистика платформы</strong></div>
                <div>👥 Пользователей: ${otherUsers.length}</div>
                <div>📝 Постов: ${posts.length}</div>
                <div>📸 Историй: ${stories.length}</div>
                <div>🚫 Заблокировано: ${bannedUsers.length}</div>
                <div>🔧 Режим техработ: ${maintenanceMode ? "ВКЛЮЧЁН" : "ВЫКЛЮЧЁН"}</div>
            </div>
        `;
        document.getElementById('statsBadge').innerHTML = `👑 Админ`;
    }

    // ========== АДМИН-ПАНЕЛЬ ==========
    function toggleMaintenance() {
        maintenanceMode = !maintenanceMode;
        saveData();
        updateMaintenanceUI();
        showToast(maintenanceMode ? "🔧 Режим техработ ВКЛЮЧЁН" : "✅ Режим техработ ВЫКЛЮЧЁН");
        renderAdminPanel(); // обновляем кнопку
        renderProfile();
    }

    const adminFunctions = [
        { emoji: "🔧", name: "ТЕХРАБОТЫ", desc: maintenanceMode ? "🔴 ВЫКЛЮЧИТЬ" : "🟢 ВКЛЮЧИТЬ", action: toggleMaintenance },
        { emoji: "👥", name: "Все пользователи", desc: "Список всех", action: () => showToast(`Пользователей: ${otherUsers.length}\n${otherUsers.map(u=>u.fullname).join(', ')}`) },
        { emoji: "🚫", name: "Заблокировать", desc: "Блокировка юзера", action: () => { let name = prompt("Имя пользователя"); let u = otherUsers.find(u=>u.fullname.toLowerCase().includes(name.toLowerCase())); if(u){ bannedUsers.push(u.id); saveData(); showToast(`Заблокирован ${u.fullname}`); } } },
        { emoji: "🔓", name: "Разблокировать", desc: "Снять блок", action: () => { if(bannedUsers.length){ let id=bannedUsers.pop(); showToast("Разблокирован"); saveData();} else showToast("Нет заблокированных"); } },
        { emoji: "📝", name: "Создать пост", desc: "Опубликовать", action: () => { 
            if(!checkMaintenance("создание постов")) return;
            let text = prompt("Текст поста"); 
            if(text){ posts.push({id:Date.now(), userId:currentUser.id, text, image:null, video:null, time:new Date().toISOString(), likes:0}); saveData(); renderFeed(); showToast("Пост создан!"); } 
        } },
        { emoji: "🗑️", name: "Удалить пост", desc: "По ID", action: () => { let id = prompt("ID поста"); let idx = posts.findIndex(p=>p.id==id); if(idx>=0){ posts.splice(idx,1); saveData(); renderFeed(); showToast("Удалено"); } } },
        { emoji: "📸", name: "Удалить историю", desc: "Последнюю", action: () => { if(stories.length){ stories.shift(); saveData(); renderStories(); showToast("История удалена"); } } },
        { emoji: "✏️", name: "Изменить имя", desc: "Своё имя", action: () => { let n = prompt("Новое имя", currentUser.fullname); if(n){ currentUser.fullname=n; currentUser.avatar=n.slice(0,2).toUpperCase(); saveData(); renderProfile(); renderFeed(); showToast("Имя изменено"); } } },
        { emoji: "💬", name: "Глобальный чат", desc: "Всем сообщение", action: () => { 
            if(!checkMaintenance("отправка сообщений")) return;
            let msg = prompt("Сообщение всем"); 
            if(msg){ otherUsers.forEach(u=>{ const key=getChatKey(currentUser.id,u.id); if(!privateMessages[key])privateMessages[key]=[]; privateMessages[key].push({id:Date.now(), senderId:currentUser.id, text:`[ADMIN] ${msg}`, time:new Date().toISOString()}); }); saveData(); showToast("Отправлено всем!"); } 
        } },
        { emoji: "🎁", name: "Бонус всем", desc: "+100 лайков", action: () => { posts.forEach(p=>p.likes+=100); saveData(); renderFeed(); showToast("Бонус начислен!"); } },
        { emoji: "📊", name: "Статистика", desc: "Полный отчёт", action: () => { showToast(`📊 Постов:${posts.length} Историй:${stories.length} Юзеров:${otherUsers.length} Жалоб:${reportedPosts.length} Техработы:${maintenanceMode?"ВКЛ":"ВЫКЛ"}`); } },
        { emoji: "📁", name: "Резервная копия", desc: "Экспорт", action: () => { let data = JSON.stringify({posts,stories,otherUsers,bannedUsers,maintenanceMode}); let blob=new Blob([data],{type:'application/json'}); let a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='backup.json'; a.click(); showToast("Бэкап создан"); } },
        { emoji: "🔄", name: "Сброс данных", desc: "Очистить всё", action: () => { if(confirm("Удалить ВСЕ данные?")){ localStorage.clear(); location.reload(); } } }
    ];

    function renderAdminPanel() {
        // Обновляем текст кнопки техработ
        adminFunctions[0].desc = maintenanceMode ? "🔴 ВЫКЛЮЧИТЬ" : "🟢 ВКЛЮЧИТЬ";
        const container = document.getElementById('adminGrid');
        container.innerHTML = adminFunctions.map(f => `
            <div class="admin-card" data-action="${f.name}">
                <div class="emoji">${f.emoji}</div>
                <div class="title">${f.name}</div>
                <div class="desc">${f.desc}</div>
            </div>
        `).join('');
        document.querySelectorAll('.admin-card').forEach((card, idx) => {
            card.onclick = () => adminFunctions[idx].action();
        });
    }

    // ========== НАВИГАЦИЯ ==========
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`${pageId}Page`).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        document.querySelector(`[data-page="${pageId}"]`).classList.add('active');
        if (pageId === 'feed') { renderFeed(); renderStories(); }
        if (pageId === 'messages') renderUsersList();
        if (pageId === 'admin') renderAdminPanel();
        if (pageId === 'profile') renderProfile();
        updateMaintenanceUI();
    }

    // ========== ОБРАБОТЧИКИ ==========
    document.getElementById('closeChatBtn')?.addEventListener('click', () => document.getElementById('chatWindow').style.display = 'none');
    document.getElementById('sendChatBtn')?.addEventListener('click', () => {
        const input = document.getElementById('chatMessageInput');
        if (input.value.trim() && window.currentChatPartner) {
            sendMessage(window.currentChatPartner.id, input.value.trim());
            input.value = '';
        }
    });
    document.getElementById('chatMessageInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') document.getElementById('sendChatBtn').click(); });
    document.getElementById('logoutBtn')?.addEventListener('click', () => location.reload());
    document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => switchPage(btn.dataset.page)));

    // Запуск
    renderFeed();
    renderStories();
    renderUsersList();
    renderProfile();
    renderAdminPanel();
    updateMaintenanceUI();
</script>
</body>
</html>
