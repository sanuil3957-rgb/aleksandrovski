<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Александровски — Общение с людьми 🥚</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #FFF5E6 0%, #FFE4D6 100%);
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        body::before {
            content: "🐣";
            position: fixed;
            bottom: 10px;
            left: 10px;
            font-size: 35px;
            opacity: 0.4;
            pointer-events: none;
            animation: bounce 2s infinite;
        }

        body::after {
            content: "🌸";
            position: fixed;
            top: 10px;
            right: 10px;
            font-size: 30px;
            opacity: 0.4;
            pointer-events: none;
            animation: sway 3s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        @keyframes sway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(10deg); }
        }

        .app {
            max-width: 500px;
            margin: 0 auto;
            background: rgba(255, 245, 235, 0.95);
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .header {
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #5a3e2b;
            z-index: 10;
            border-bottom: 3px solid #FFD700;
            position: relative;
        }

        .header::before {
            content: "🐰🥚🐣";
            position: absolute;
            right: 10px;
            top: -5px;
            font-size: 35px;
            opacity: 0.2;
            pointer-events: none;
        }

        .header-logo {
            font-weight: 700;
            font-size: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255,255,255,0.3);
            padding: 5px 12px;
            border-radius: 30px;
        }

        .admin-badge {
            background: #FFD700;
            color: #FF8C42;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
        }

        .online-count {
            font-size: 12px;
            background: rgba(255,255,255,0.3);
            padding: 4px 10px;
            border-radius: 20px;
        }

        .maintenance-banner {
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
            color: white;
            text-align: center;
            padding: 10px;
            font-size: 13px;
            display: none;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.9; }
            50% { opacity: 1; }
        }

        .auth-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 32px 24px;
            background: rgba(255, 245, 235, 0.95);
            overflow-y: auto;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin: 0 auto 12px;
            animation: eggWobble 2s infinite;
        }

        @keyframes eggWobble {
            0%, 100% { transform: rotate(0deg); }
            25% { transform: rotate(5deg); }
            75% { transform: rotate(-5deg); }
        }

        .input-group {
            margin-bottom: 18px;
        }

        .input-group input, .input-group textarea {
            width: 100%;
            padding: 14px 16px;
            border: 2px solid #FFD6A5;
            border-radius: 30px;
            font-size: 16px;
            background: white;
            outline: none;
        }

        .input-group input:focus {
            border-color: #FFB347;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 15px 0;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 12px;
            transition: 0.2s;
        }

        .btn:active { transform: scale(0.98); }

        .btn-danger {
            background: linear-gradient(135deg, #FF6B6B, #FF4757);
        }

        .switch-auth {
            text-align: center;
            margin-top: 24px;
            color: #a0522d;
        }

        .switch-auth span {
            color: #FF8C42;
            cursor: pointer;
            font-weight: 600;
        }

        .error-msg {
            color: #dc3545;
            font-size: 13px;
            text-align: center;
            margin-top: 8px;
        }

        .bottom-nav {
            background: rgba(255, 245, 235, 0.98);
            display: flex;
            justify-content: space-around;
            padding: 10px 16px 16px;
            border-top: 2px solid #FFD6A5;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            font-size: 11px;
            color: #a0522d;
            cursor: pointer;
            background: none;
            border: none;
        }

        .nav-item.active {
            color: #FF8C42;
        }

        .nav-icon {
            font-size: 22px;
        }

        .page {
            flex: 1;
            overflow-y: auto;
            display: none;
        }

        .page.active-page {
            display: block;
        }

        .admin-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 16px;
        }

        .admin-card {
            background: white;
            border-radius: 20px;
            padding: 16px;
            cursor: pointer;
            text-align: center;
            border: 1px solid #FFD6A5;
            transition: 0.2s;
        }

        .admin-card:active { transform: scale(0.97); }
        .admin-card .emoji { font-size: 32px; margin-bottom: 8px; }
        .admin-card .title { font-weight: 600; font-size: 14px; }
        .admin-card .desc { font-size: 11px; color: #888; margin-top: 4px; }

        .stories-row {
            background: rgba(255, 245, 235, 0.9);
            padding: 16px;
            overflow-x: auto;
            white-space: nowrap;
            display: flex;
            gap: 16px;
            border-bottom: 1px solid #FFD6A5;
        }

        .story-circle {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .story-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            color: white;
            border: 3px solid #FFD700;
            background-size: cover;
            background-position: center;
        }

        .story-avatar.add {
            background: #f0f2f5;
            border: 2px dashed #FFB347;
            color: #FFB347;
        }

        .story-viewer {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: black;
            z-index: 1000;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .story-media {
            width: 100%;
            max-height: 80%;
            object-fit: contain;
        }

        .story-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.5);
            border: none;
            color: white;
            font-size: 28px;
            width: 44px;
            border-radius: 50%;
            cursor: pointer;
        }

        .story-modal {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.9);
            z-index: 1100;
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
        }

        .story-modal button {
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 30px;
            font-size: 16px;
            width: 250px;
            cursor: pointer;
        }

        .users-list {
            padding: 8px 0;
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            gap: 14px;
            background: rgba(255, 245, 235, 0.95);
            margin: 8px 12px;
            border-radius: 20px;
            cursor: pointer;
            border: 1px solid #FFD6A5;
            transition: 0.2s;
        }

        .user-item:hover {
            background: rgba(255, 235, 215, 0.95);
        }

        .user-avatar {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            color: white;
        }

        .user-info {
            flex: 1;
        }

        .user-name {
            font-weight: 700;
            font-size: 16px;
            color: #5a3e2b;
        }

        .user-status {
            font-size: 12px;
            color: #888;
        }

        .user-status.online {
            color: #4cd964;
        }

        .chat-window {
            display: none;
            flex-direction: column;
            height: 100%;
            background: rgba(255, 245, 235, 0.98);
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 200;
        }

        .messages-area {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .message {
            display: flex;
            max-width: 80%;
        }

        .message.incoming { align-self: flex-start; }
        .message.outgoing { align-self: flex-end; }

        .bubble {
            padding: 10px 14px;
            border-radius: 20px;
            font-size: 14px;
            max-width: 100%;
            word-wrap: break-word;
        }

        .incoming .bubble {
            background: white;
            border: 1px solid #FFD6A5;
        }
        .outgoing .bubble {
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            color: white;
        }

        .message-time {
            font-size: 10px;
            opacity: 0.7;
            margin-top: 4px;
        }

        .input-container {
            background: rgba(255, 245, 235, 0.95);
            padding: 12px;
            display: flex;
            gap: 10px;
            border-top: 1px solid #FFD6A5;
        }

        .input-container input {
            flex: 1;
            padding: 12px;
            border: 2px solid #FFD6A5;
            background: white;
            border-radius: 30px;
            outline: none;
        }

        .profile-header {
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            padding: 32px 20px;
            text-align: center;
            color: white;
        }

        .profile-avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: white;
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            color: #FF8C42;
        }

        .feed-card {
            background: rgba(255, 245, 235, 0.95);
            margin: 12px 16px;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid #FFD6A5;
        }

        .card-header {
            display: flex;
            align-items: center;
            padding: 12px;
            gap: 12px;
        }

        .card-content {
            padding: 0 12px 12px;
        }

        .card-actions {
            padding: 12px;
            border-top: 1px solid #FFD6A5;
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }

        .like-btn, .comment-btn {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            color: #888;
            transition: 0.2s;
        }

        .like-btn.liked {
            color: #FF4757;
        }

        .like-btn:active, .comment-btn:active { transform: scale(1.05); }

        .comments-section {
            padding: 12px;
            border-top: 1px solid #FFD6A5;
            background: rgba(255, 245, 235, 0.8);
        }

        .comment {
            padding: 8px 0;
            font-size: 13px;
            border-bottom: 1px solid #FFD6A5;
        }

        .comment strong {
            color: #FF8C42;
        }

        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .add-comment input {
            flex: 1;
            padding: 8px 12px;
            border: 1px solid #FFD6A5;
            border-radius: 20px;
            background: white;
            outline: none;
        }

        .add-comment button {
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            border: none;
            padding: 8px 16px;
            border-radius: 20px;
            color: white;
            cursor: pointer;
        }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 20px;
            right: 20px;
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            color: white;
            padding: 12px;
            border-radius: 30px;
            text-align: center;
            z-index: 2000;
            animation: fadeOut 2s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; transform: translateY(0); }
            70% { opacity: 1; }
            100% { opacity: 0; visibility: hidden; transform: translateY(20px); }
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #a0522d;
        }

        .password-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 2000;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .password-modal {
            background: white;
            border-radius: 30px;
            padding: 30px;
            text-align: center;
            width: 280px;
            animation: bounceIn 0.3s ease;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .password-modal h3 {
            color: #FF8C42;
            margin-bottom: 15px;
        }

        .password-modal input {
            width: 100%;
            padding: 12px;
            margin: 15px 0;
            border: 2px solid #FFD6A5;
            border-radius: 30px;
            text-align: center;
            font-size: 18px;
            outline: none;
        }

        .password-modal input:focus {
            border-color: #FFB347;
        }

        .password-modal button {
            width: 100%;
            padding: 12px;
            margin-top: 10px;
            background: linear-gradient(135deg, #FFB347, #FF8C42);
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            cursor: pointer;
        }

        .password-modal .cancel-btn {
            background: #ccc;
            color: #333;
        }

        .easter-sticker {
            display: inline-block;
            font-size: 28px;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }

        .easter-sticker:hover {
            transform: scale(1.2);
        }

        .sticker-panel {
            background: rgba(255, 245, 235, 0.95);
            border-radius: 20px;
            padding: 10px;
            margin: 5px 12px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            border: 1px solid #FFD6A5;
        }
    </style>
</head>
<body>
<div class="app">
    <div class="header">
        <div class="header-logo">
            <span>🐰</span> Александровски
            <span class="admin-badge" id="adminBadge" style="display:none;">ADMIN</span>
        </div>
        <div class="online-count" id="onlineCount">👥 0 онлайн</div>
    </div>

    <div id="maintenanceBanner" class="maintenance-banner">
        🥚🔧 ТЕХНИЧЕСКИЕ РАБОТЫ 🔧🥚<br>
        Публикация постов, историй и отправка сообщений временно недоступны
    </div>

    <div id="authContainer" class="auth-container">
        <div class="logo">
            <div class="logo-icon">🐣</div>
            <h2 style="color: #FF8C42;">Александровски</h2>
            <p style="color: #a0522d; margin-top: 8px;">🐰 Общайтесь с реальными людьми! 🥚</p>
        </div>
        <div id="loginForm">
            <div class="input-group"><input type="text" id="loginUsername" placeholder="Логин"></div>
            <div class="input-group"><input type="password" id="loginPassword" placeholder="Пароль"></div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMeLogin">
                <label>🔐 Запомнить меня на этом устройстве</label>
            </div>
            <button class="btn" id="doLoginBtn">🥚 Войти 🐣</button>
            <div class="switch-auth">Нет аккаунта? <span id="showRegisterBtn">Зарегистрироваться</span></div>
            <div id="loginError" class="error-msg"></div>
        </div>
        <div id="registerForm" style="display:none">
            <div class="input-group"><input type="text" id="regFullname" placeholder="Имя и фамилия"></div>
            <div class="input-group"><input type="text" id="regLogin" placeholder="Логин"></div>
            <div class="input-group"><input type="password" id="regPassword" placeholder="Пароль"></div>
            <div class="input-group"><textarea id="regBio" placeholder="О себе" rows="2"></textarea></div>
            <div class="checkbox-group">
                <input type="checkbox" id="rememberMeReg">
                <label>🔐 Запомнить меня на этом устройстве</label>
            </div>
            <button class="btn" id="doRegisterBtn">🐣 Зарегистрироваться 🥚</button>
            <div class="switch-auth">Уже есть аккаунт? <span id="showLoginBtn">Войти</span></div>
            <div id="regError" class="error-msg"></div>
        </div>
    </div>

    <div id="mainApp" style="display:none; flex-direction: column; height: 100%;">
        <div id="feedPage" class="page active-page">
            <div class="stories-row" id="storiesRow"></div>
            <div id="feedContainer"></div>
        </div>
        <div id="messagesPage" class="page">
            <div id="usersListContainer" class="users-list"></div>
        </div>
        <div id="adminPage" class="page">
            <div class="admin-grid" id="adminGrid"></div>
        </div>
        <div id="profilePage" class="page">
            <div id="profileContent"></div>
            <div style="padding: 16px;"><button id="logoutBtn" class="btn btn-danger">🐰 Выйти 🐣</button></div>
        </div>
        <div class="bottom-nav">
            <button class="nav-item active" data-page="feed"><span class="nav-icon">🏠</span><span>Лента</span></button>
            <button class="nav-item" data-page="messages"><span class="nav-icon">💬</span><span>Люди</span></button>
            <button class="nav-item" data-page="admin" id="adminNavBtn" style="display:none;"><span class="nav-icon">⚙️</span><span>Админ</span></button>
            <button class="nav-item" data-page="profile"><span class="nav-icon">👤</span><span>Профиль</span></button>
        </div>
    </div>

    <div id="chatWindow" class="chat-window">
        <div class="header" style="background: linear-gradient(135deg, #FFB347, #FF8C42);">
            <button id="closeChatBtn" style="background:none; border:none; color:white; font-size:28px;">←</button>
            <div style="flex:1"><span id="chatWindowTitle">Чат</span></div>
            <button id="showStickersBtn" style="background:none; border:none; font-size:24px; cursor:pointer;">🐣</button>
        </div>
        <div id="chatMessagesArea" class="messages-area"></div>
        <div id="stickerPanel" class="sticker-panel" style="display:none;">
            <span class="easter-sticker" data-sticker="🥚">🥚</span>
            <span class="easter-sticker" data-sticker="🐣">🐣</span>
            <span class="easter-sticker" data-sticker="🐰">🐰</span>
            <span class="easter-sticker" data-sticker="🌸">🌸</span>
            <span class="easter-sticker" data-sticker="🌷">🌷</span>
            <span class="easter-sticker" data-sticker="🐥">🐥</span>
            <span class="easter-sticker" data-sticker="💐">💐</span>
            <span class="easter-sticker" data-sticker="✨">✨</span>
            <span class="easter-sticker" data-sticker="🎀">🎀</span>
            <span class="easter-sticker" data-sticker="⭐">⭐</span>
        </div>
        <div class="input-container">
            <input type="text" id="chatMessageInput" placeholder="Сообщение...">
            <button id="sendChatBtn" style="background: linear-gradient(135deg, #FFB347, #FF8C42); border:none; width:44px; border-radius:50%; color:white;">➤</button>
        </div>
    </div>

    <div id="storyViewer" class="story-viewer">
        <button class="story-close" id="closeStoryBtn">✕</button>
        <img id="storyImageView" class="story-media" style="display:none;">
        <video id="storyVideoView" class="story-media" style="display:none;" controls autoplay></video>
        <div id="storyTextView" class="story-text"></div>
    </div>

    <div id="storyModal" class="story-modal">
        <button id="selectPhotoBtn">📷 Выбрать фото</button>
        <button id="selectVideoBtn">🎥 Выбрать видео</button>
        <button id="selectTextBtn">📝 Пасхальное поздравление</button>
        <button id="cancelStoryBtn" style="background:#555;">Отмена</button>
        <input type="file" id="photoStoryInput" accept="image/*" style="display:none">
        <input type="file" id="videoStoryInput" accept="video/*" style="display:none">
    </div>

    <!-- Модальное окно для пароля админа -->
    <div id="adminPasswordOverlay" class="password-overlay">
        <div class="password-modal">
            <div style="font-size: 48px; margin-bottom: 10px;">👑</div>
            <h3>Введите пароль администратора</h3>
            <input type="password" id="adminPasswordInput" placeholder="Пароль" autocomplete="off">
            <button id="submitAdminPasswordBtn">Подтвердить</button>
            <button id="cancelAdminPasswordBtn" class="cancel-btn">Отмена</button>
        </div>
    </div>
</div>

<script>
    // ========== ДАННЫЕ ==========
    let platformData = {
        users: [],
        posts: [],
        stories: [],
        privateMessages: {},
        bannedUsers: [],
        maintenanceMode: false,
        userLikes: {},
        postComments: {}
    };
    
    let currentUser = null;
    let deviceId = null;
    let adminSessionValid = false;
    let pendingAdminAction = null;
    let currentChatPartner = null;
    let syncInterval = null;

    function getDeviceId() {
        let id = localStorage.getItem('device_unique_id_easter');
        if (!id) {
            id = 'device_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            localStorage.setItem('device_unique_id_easter', id);
        }
        return id;
    }

    function loadData() {
        const saved = localStorage.getItem('alexandrovski_easter_data');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                platformData = parsed;
            } catch(e) {}
        }
        
        if (!platformData.userLikes) platformData.userLikes = {};
        if (!platformData.postComments) platformData.postComments = {};
        if (!platformData.privateMessages) platformData.privateMessages = {};
        
        if (platformData.users.length === 0) {
            platformData.users = [
                {
                    id: "admin_alex",
                    fullname: "Александр Епифанов 🐰",
                    login: "alex",
                    password: "admin123",
                    bio: "Создатель Александровски | С Пасхой! 🥚",
                    avatar: "🐣",
                    isAdmin: true,
                    isOnline: false,
                    lastSeen: new Date().toISOString()
                },
                {
                    id: "user_demo",
                    fullname: "Мария Иванова 🐣",
                    login: "maria",
                    password: "123",
                    bio: "Люблю общаться! 🌸",
                    avatar: "МИ",
                    isAdmin: false,
                    isOnline: false,
                    lastSeen: new Date().toISOString()
                }
            ];
            platformData.posts = [{
                id: "p1",
                userId: "admin_alex",
                text: "🐣 С Пасхой! Христос Воскресе! 🥚🌸 Общайтесь с друзьями в чате! 💬",
                time: new Date().toISOString(),
                likes: 0
            }];
            platformData.stories = [];
            platformData.privateMessages = {};
            platformData.bannedUsers = [];
            platformData.maintenanceMode = false;
            saveData();
        }
        
        saveToLocal();
    }

    function saveData() {
        localStorage.setItem('alexandrovski_easter_data', JSON.stringify(platformData));
    }

    function saveToLocal() {
        localStorage.setItem('alexandrovski_easter_data', JSON.stringify(platformData));
    }

    // ========== СИНХРОНИЗАЦИЯ ДЛЯ ВСЕХ ПОЛЬЗОВАТЕЛЕЙ ==========
    function startSync() {
        if (syncInterval) clearInterval(syncInterval);
        syncInterval = setInterval(() => {
            const saved = localStorage.getItem('alexandrovski_easter_data');
            if (saved) {
                try {
                    const newData = JSON.parse(saved);
                    // Проверяем изменился ли режим техработ
                    if (newData.maintenanceMode !== platformData.maintenanceMode) {
                        platformData.maintenanceMode = newData.maintenanceMode;
                        updateMaintenanceUI();
                        showToast(platformData.maintenanceMode ? "🔧 Технические работы начались!" : "✅ Технические работы завершены!");
                    }
                    // Обновляем сообщения
                    if (JSON.stringify(newData.privateMessages) !== JSON.stringify(platformData.privateMessages)) {
                        platformData.privateMessages = newData.privateMessages;
                        if (currentChatPartner) {
                            renderChatMessages(currentChatPartner.id);
                        }
                        renderUsersList();
                    }
                    platformData.posts = newData.posts;
                    platformData.stories = newData.stories;
                    platformData.userLikes = newData.userLikes;
                    platformData.postComments = newData.postComments;
                    platformData.bannedUsers = newData.bannedUsers;
                    platformData.users = newData.users;
                    
                    if (document.getElementById('feedPage').classList.contains('active-page')) {
                        renderFeed();
                        renderStories();
                    }
                    if (document.getElementById('messagesPage').classList.contains('active-page')) {
                        renderUsersList();
                    }
                    if (document.getElementById('profilePage').classList.contains('active-page')) {
                        renderProfile();
                    }
                    updateOnlineCount();
                } catch(e) {}
            }
        }, 3000);
    }

    // ========== СЕССИЯ ==========
    function saveSession(userId, remember) {
        const sessionData = { userId: userId, deviceId: deviceId, timestamp: Date.now() };
        if (remember) {
            localStorage.setItem('alexandrovski_easter_session', JSON.stringify(sessionData));
        } else {
            sessionStorage.setItem('alexandrovski_easter_session', JSON.stringify(sessionData));
        }
    }

    function getSessionUserId() {
        let sessionStr = sessionStorage.getItem('alexandrovski_easter_session');
        if (sessionStr) {
            try {
                const session = JSON.parse(sessionStr);
                if (session.deviceId === deviceId) return session.userId;
            } catch(e) {}
        }
        sessionStr = localStorage.getItem('alexandrovski_easter_session');
        if (sessionStr) {
            try {
                const session = JSON.parse(sessionStr);
                if (session.deviceId === deviceId) return session.userId;
            } catch(e) {}
        }
        return null;
    }

    function clearSession() {
        sessionStorage.removeItem('alexandrovski_easter_session');
        localStorage.removeItem('alexandrovski_easter_session');
        adminSessionValid = false;
    }

    function checkAutoLogin() {
        const userId = getSessionUserId();
        if (userId) {
            const user = platformData.users.find(u => u.id === userId);
            if (user) {
                currentUser = user;
                currentUser.isOnline = true;
                currentUser.lastSeen = new Date().toISOString();
                saveData();
                showMainApp();
                return true;
            }
        }
        return false;
    }

    // ========== АДМИН ПАРОЛЬ ==========
    function showAdminPasswordModal(callback) {
        pendingAdminAction = callback;
        const overlay = document.getElementById('adminPasswordOverlay');
        const input = document.getElementById('adminPasswordInput');
        input.value = '';
        overlay.style.display = 'flex';
        input.focus();
    }

    function hideAdminPasswordModal() {
        document.getElementById('adminPasswordOverlay').style.display = 'none';
        pendingAdminAction = null;
    }

    function checkAdminAccess(callback) {
        if (adminSessionValid) {
            callback();
            return;
        }
        showAdminPasswordModal(callback);
    }

    document.getElementById('submitAdminPasswordBtn')?.addEventListener('click', () => {
        const password = document.getElementById('adminPasswordInput').value;
        if (password === '2016') {
            adminSessionValid = true;
            hideAdminPasswordModal();
            if (pendingAdminAction) {
                pendingAdminAction();
                pendingAdminAction = null;
            }
        } else {
            showToast("❌ Неверный пароль!");
            document.getElementById('adminPasswordInput').value = '';
        }
    });

    document.getElementById('cancelAdminPasswordBtn')?.addEventListener('click', () => {
        hideAdminPasswordModal();
        pendingAdminAction = null;
    });

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape') {
            hideAdminPasswordModal();
        }
    });

    // ========== ЛАЙКИ ==========
    function toggleLike(postId) {
        const likeKey = `${postId}_${currentUser.id}`;
        const post = platformData.posts.find(p => p.id === postId);
        
        if (platformData.userLikes[likeKey]) {
            delete platformData.userLikes[likeKey];
            if (post) post.likes = Math.max(0, (post.likes || 0) - 1);
            showToast("❤️ Лайк убран");
        } else {
            platformData.userLikes[likeKey] = true;
            if (post) post.likes = (post.likes || 0) + 1;
            showToast("🥚 Пасхальный лайк поставлен! 🐣");
        }
        
        saveData();
        renderFeed();
    }

    // ========== КОММЕНТАРИИ ==========
    function addComment(postId, text) {
        if (!text.trim()) return;
        if (!platformData.postComments[postId]) platformData.postComments[postId] = [];
        
        platformData.postComments[postId].push({
            id: Date.now(),
            userId: currentUser.id,
            userName: currentUser.fullname,
            text: text.trim(),
            time: new Date().toISOString()
        });
        
        saveData();
        renderFeed();
        showToast("🐣 Комментарий добавлен!");
    }

    function toggleComments(postId) {
        const commentsDiv = document.getElementById(`comments-${postId}`);
        if (commentsDiv) {
            if (commentsDiv.style.display === 'none') {
                commentsDiv.style.display = 'block';
            } else {
                commentsDiv.style.display = 'none';
            }
        }
    }

    // ========== РЕЖИМ ТЕХРАБОТ (СИНХРОНИЗИРУЕТСЯ ДЛЯ ВСЕХ) ==========
    function updateMaintenanceUI() {
        const banner = document.getElementById('maintenanceBanner');
        const isMaintenance = platformData.maintenanceMode;
        
        if (isMaintenance) {
            banner.style.display = 'block';
            const msgInput = document.getElementById('chatMessageInput');
            if (msgInput) msgInput.disabled = true;
            const sendBtn = document.getElementById('sendChatBtn');
            if (sendBtn) sendBtn.disabled = true;
            const addStoryCircle = document.getElementById('addStoryCircle');
            if (addStoryCircle) addStoryCircle.style.opacity = '0.5';
        } else {
            banner.style.display = 'none';
            const msgInput = document.getElementById('chatMessageInput');
            if (msgInput) msgInput.disabled = false;
            const sendBtn = document.getElementById('sendChatBtn');
            if (sendBtn) sendBtn.disabled = false;
            const addStoryCircle = document.getElementById('addStoryCircle');
            if (addStoryCircle) addStoryCircle.style.opacity = '1';
        }
    }

    function toggleMaintenance() {
        platformData.maintenanceMode = !platformData.maintenanceMode;
        saveData();
        updateMaintenanceUI();
        showToast(platformData.maintenanceMode ? "🥚 Пасхальные техработы ВКЛЮЧЕНЫ ДЛЯ ВСЕХ 🐣" : "🐰 Пасхальные техработы ВЫКЛЮЧЕНЫ ДЛЯ ВСЕХ 🌸");
        renderAdminPanel();
        renderProfile();
    }

    function checkMaintenance(actionName) {
        if (platformData.maintenanceMode) {
            showToast(`🥚 Технические работы! ${actionName} временно недоступно 🐣`);
            return false;
        }
        return true;
    }

    function showToast(msg) {
        const toast = document.createElement('div');
        toast.className = 'toast';
        toast.innerText = msg;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }

    function escapeHtml(str) { return String(str).replace(/[&<>]/g, function(m) { return m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'; }); }

    function formatTimeAgo(dateStr) {
        if (!dateStr) return "давно";
        const date = new Date(dateStr);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000 / 60);
        if (diff < 1) return "только что";
        if (diff < 60) return `${diff} мин назад`;
        if (diff < 1440) return `${Math.floor(diff / 60)} ч назад`;
        return `${Math.floor(diff / 1440)} дн назад`;
    }

    function updateOnlineCount() {
        const onlineCount = platformData.users.filter(u => u.isOnline && u.id !== currentUser?.id).length;
        const countSpan = document.getElementById('onlineCount');
        if (countSpan) countSpan.innerHTML = `🐣 ${onlineCount} онлайн`;
    }

    // ========== РЕГИСТРАЦИЯ И ВХОД ==========
    function register() {
        const fullname = document.getElementById('regFullname').value.trim();
        const login = document.getElementById('regLogin').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const bio = document.getElementById('regBio').value.trim();
        const rememberMe = document.getElementById('rememberMeReg').checked;
        const errorSpan = document.getElementById('regError');

        if (!fullname || !login || !password) {
            errorSpan.innerText = 'Заполните все поля';
            return;
        }
        if (platformData.users.find(u => u.login === login)) {
            errorSpan.innerText = 'Логин уже занят';
            return;
        }
        
        const newUser = {
            id: 'user_' + Date.now(),
            fullname: fullname + " 🐣",
            login: login,
            password: password,
            bio: bio || "С Пасхой! 🥚",
            avatar: "🐰",
            isAdmin: false,
            isOnline: true,
            lastSeen: new Date().toISOString()
        };
        platformData.users.push(newUser);
        saveData();
        
        currentUser = newUser;
        saveSession(currentUser.id, rememberMe);
        showMainApp();
    }

    function login() {
        const loginVal = document.getElementById('loginUsername').value.trim();
        const passwordVal = document.getElementById('loginPassword').value.trim();
        const rememberMe = document.getElementById('rememberMeLogin').checked;
        const errorSpan = document.getElementById('loginError');
        
        const user = platformData.users.find(u => u.login === loginVal && u.password === passwordVal);
        if (!user) {
            errorSpan.innerText = 'Неверный логин или пароль';
            return;
        }
        
        currentUser = user;
        currentUser.isOnline = true;
        currentUser.lastSeen = new Date().toISOString();
        saveData();
        saveSession(currentUser.id, rememberMe);
        showMainApp();
    }

    function logout() {
        if (currentUser) {
            currentUser.isOnline = false;
            currentUser.lastSeen = new Date().toISOString();
            saveData();
        }
        clearSession();
        currentUser = null;
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
        showToast("🐰 Вы вышли из аккаунта. С Пасхой! 🥚");
    }

    function showMainApp() {
        document.getElementById('authContainer').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        
        if (currentUser.isAdmin) {
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('adminNavBtn').style.display = 'flex';
        } else {
            document.getElementById('adminBadge').style.display = 'none';
            document.getElementById('adminNavBtn').style.display = 'none';
        }
        
        updateOnlineCount();
        renderFeed();
        renderStories();
        renderUsersList();
        renderProfile();
        if (currentUser.isAdmin) renderAdminPanel();
        updateMaintenanceUI();
        startSync();
        switchPage('feed');
    }

    // ========== ЛЕНТА ==========
    function renderFeed() {
        const container = document.getElementById('feedContainer');
        const filteredPosts = platformData.posts.filter(p => !platformData.bannedUsers.includes(p.userId));
        const sorted = [...filteredPosts].reverse();
        
        if (sorted.length === 0) {
            container.innerHTML = '<div class="empty-state">🐣 Нет постов. Напишите пасхальное поздравление! 🥚</div>';
            return;
        }
        
        container.innerHTML = sorted.map(post => {
            const author = platformData.users.find(u => u.id === post.userId);
            const authorName = author ? author.fullname : "Пользователь";
            const authorAvatar = author ? author.avatar : "🥚";
            const likeKey = `${post.id}_${currentUser.id}`;
            const isLiked = platformData.userLikes[likeKey];
            const comments = platformData.postComments[post.id] || [];
            
            return `
                <div class="feed-card">
                    <div class="card-header">
                        <div class="user-avatar" style="width:44px; height:44px; font-size:18px;">${authorAvatar}</div>
                        <div><strong>${escapeHtml(authorName)}</strong><br><span style="font-size:11px; color:#aaa;">${new Date(post.time).toLocaleString()}</span></div>
                    </div>
                    <div class="card-content">${escapeHtml(post.text)}</div>
                    <div class="card-actions">
                        <button class="like-btn ${isLiked ? 'liked' : ''}" onclick="toggleLike('${post.id}')">
                            ${isLiked ? '❤️' : '🤍'} ${post.likes || 0}
                        </button>
                        <button class="comment-btn" onclick="toggleComments('${post.id}')">
                            💬 ${comments.length}
                        </button>
                    </div>
                    <div id="comments-${post.id}" class="comments-section" style="display:none;">
                        ${comments.map(c => `
                            <div class="comment">
                                <strong>${escapeHtml(c.userName)}</strong>: ${escapeHtml(c.text)}
                                <div style="font-size:10px; color:#aaa;">${new Date(c.time).toLocaleString()}</div>
                            </div>
                        `).join('')}
                        <div class="add-comment">
                            <input type="text" id="comment-input-${post.id}" placeholder="Написать комментарий...">
                            <button onclick="addComment('${post.id}', document.getElementById('comment-input-${post.id}').value); document.getElementById('comment-input-${post.id}').value = '';">🐣</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // ========== ИСТОРИИ ==========
    function renderStories() {
        const container = document.getElementById('storiesRow');
        const validStories = platformData.stories.filter(s => s && s.data);
        
        const storiesHtml = validStories.map((story, idx) => {
            const author = platformData.users.find(u => u.id === story.userId);
            const authorName = author ? author.fullname.slice(0,2) : "🐣";
            return `
                <div class="story-circle" onclick="viewStory(${idx})">
                    <div class="story-avatar" style="background-image: url('${story.mediaType === 'image' ? story.data : ''}'); background-size: cover;">
                        ${story.mediaType === 'image' ? '' : (story.mediaType === 'video' ? '🎥' : '📝')}
                    </div>
                    <span class="story-name">${authorName}</span>
                </div>
            `;
        }).join('');
        
        container.innerHTML = `
            <div class="story-circle" id="addStoryCircle">
                <div class="story-avatar add">+</div>
                <span class="story-name">Моя история</span>
            </div>
            ${storiesHtml}
        `;
        
        const addBtn = document.getElementById('addStoryCircle');
        if (addBtn) {
            addBtn.onclick = () => {
                if (!checkMaintenance("добавление историй")) return;
                document.getElementById('storyModal').style.display = 'flex';
            };
        }
    }

    window.viewStory = function(idx) {
        const story = platformData.stories[idx];
        if (!story || !story.data) { showToast("История недоступна"); return; }
        const viewer = document.getElementById('storyViewer');
        const imgView = document.getElementById('storyImageView');
        const videoView = document.getElementById('storyVideoView');
        const textView = document.getElementById('storyTextView');
        
        imgView.style.display = 'none';
        videoView.style.display = 'none';
        if (videoView) videoView.pause();
        
        if (story.mediaType === 'image') {
            imgView.src = story.data;
            imgView.style.display = 'block';
        } else if (story.mediaType === 'video') {
            videoView.src = story.data;
            videoView.style.display = 'block';
            videoView.play().catch(e => console.log);
        } else {
            textView.innerText = story.text || '';
        }
        
        viewer.style.display = 'flex';
        if (window.storyTimeout) clearTimeout(window.storyTimeout);
        window.storyTimeout = setTimeout(() => {
            viewer.style.display = 'none';
            if (videoView) videoView.pause();
        }, 10000);
    };

    function addStory(mediaType, data, text = '') {
        if (!checkMaintenance("добавление историй")) return;
        const newStory = {
            id: Date.now(),
            userId: currentUser.id,
            mediaType: mediaType,
            data: data,
            text: text,
            time: new Date().toISOString()
        };
        platformData.stories.unshift(newStory);
        if (platformData.stories.length > 20) platformData.stories.pop();
        saveData();
        renderStories();
        showToast("🥚 Пасхальная история добавлена! 🐣");
    }

    // ========== ЧАТЫ ==========
    function renderUsersList() {
        const container = document.getElementById('usersListContainer');
        const otherUsers = platformData.users.filter(u => u.id !== currentUser.id && !platformData.bannedUsers.includes(u.id));
        
        if (otherUsers.length === 0) {
            container.innerHTML = `<div class="empty-state">🐣 Пока нет других пользователей<br>Пригласите друзей зарегистрироваться! 🥚</div>`;
            return;
        }
        
        container.innerHTML = otherUsers.map(user => `
            <div class="user-item" data-user-id="${user.id}">
                <div class="user-avatar">${user.avatar || "🥚"}</div>
                <div class="user-info">
                    <div class="user-name">${escapeHtml(user.fullname)}</div>
                    <div class="user-status ${user.isOnline ? 'online' : ''}">
                        ${user.isOnline ? '🟢 онлайн 🐣' : '⚫ был(а) ' + formatTimeAgo(user.lastSeen)}
                    </div>
                </div>
            </div>
        `).join('');
        
        document.querySelectorAll('.user-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.userId));
        });
    }

    function getChatKey(u1, u2) { return [u1, u2].sort().join('_'); }
    
    function openChat(userId) {
        const user = platformData.users.find(u => u.id === userId);
        if (!user) return;
        document.getElementById('chatWindowTitle').innerHTML = `${escapeHtml(user.fullname)} ${user.isOnline ? '🐣' : '🥚'}`;
        document.getElementById('chatWindow').style.display = 'flex';
        currentChatPartner = user;
        renderChatMessages(userId);
        updateMaintenanceUI();
    }
    
    function renderChatMessages(otherId) {
        const key = getChatKey(currentUser.id, otherId);
        const msgs = platformData.privateMessages[key] || [];
        const container = document.getElementById('chatMessagesArea');
        
        if (msgs.length === 0) {
            container.innerHTML = '<div class="empty-state">🐰 Напишите первое сообщение! 🥚</div>';
            return;
        }
        
        container.innerHTML = msgs.map(msg => `
            <div class="message ${msg.senderId === currentUser.id ? 'outgoing' : 'incoming'}">
                <div class="bubble">
                    ${escapeHtml(msg.text)}
                    <div class="message-time">
                        ${new Date(msg.time).toLocaleTimeString()}
                        ${msg.read && msg.senderId !== currentUser.id ? ' ✓✓' : ''}
                    </div>
                </div>
            </div>
        `).join('');
        container.scrollTop = container.scrollHeight;
    }
    
    function markMessagesAsRead(otherId) {
        const key = getChatKey(currentUser.id, otherId);
        if (platformData.privateMessages[key]) {
            let updated = false;
            platformData.privateMessages[key].forEach(msg => {
                if (msg.senderId !== currentUser.id && !msg.read) {
                    msg.read = true;
                    updated = true;
                }
            });
            if (updated) {
                saveData();
                renderChatMessages(otherId);
            }
        }
    }
    
    function sendMessage(otherId, text) {
        if (!checkMaintenance("отправка сообщений")) return;
        if (!text.trim()) return;
        
        const key = getChatKey(currentUser.id, otherId);
        if (!platformData.privateMessages[key]) platformData.privateMessages[key] = [];
        
        platformData.privateMessages[key].push({
            id: Date.now(),
            senderId: currentUser.id,
            text: text.trim(),
            time: new Date().toISOString(),
            read: false
        });
        
        saveData();
        renderChatMessages(otherId);
        
        const receiver = platformData.users.find(u => u.id === otherId);
        showToast(`🐣 Сообщение отправлено ${receiver?.fullname} 🥚`);
        
        document.getElementById('chatMessageInput').value = '';
    }

    // ========== ПРОФИЛЬ ==========
    function renderProfile() {
        const lastSeenText = currentUser.lastSeen ? formatTimeAgo(currentUser.lastSeen) : "только что";
        document.getElementById('profileContent').innerHTML = `
            <div class="profile-header">
                <div class="profile-avatar">${currentUser.avatar || "🐣"}</div>
                <div style="font-size:24px; font-weight:700;">${escapeHtml(currentUser.fullname)}</div>
                <div>${escapeHtml(currentUser.bio)}</div>
                <div style="margin-top:8px; font-size:13px;">
                    ${currentUser.isOnline ? '🐣 Онлайн' : '🥚 Был(а) ' + lastSeenText}
                </div>
                ${currentUser.isAdmin ? '<div style="margin-top:8px;"><span class="admin-badge" style="background:white;">👑 Администратор 🐰</span></div>' : ''}
            </div>
            <div style="background:white; margin:16px; border-radius:24px; padding:16px;">
                <div><strong>📊 Пасхальная статистика</strong></div>
                <div>🐣 Всего пользователей: ${platformData.users.length}</div>
                <div>🥚 Постов: ${platformData.posts.length}</div>
                <div>🐰 Историй: ${platformData.stories.length}</div>
                <div>🔧 Режим техработ: ${platformData.maintenanceMode ? "ВКЛЮЧЁН 🥚" : "ВЫКЛЮЧЁН 🐣"}</div>
                <div>🌸 ХРИСТОС ВОСКРЕСЕ! 🌸</div>
            </div>
        `;
    }

    // ========== АДМИН-ПАНЕЛЬ ==========
    const adminFunctions = [
        { emoji: "🔧🥚", name: "ТЕХРАБОТЫ", desc: platformData.maintenanceMode ? "🔴 ВЫКЛЮЧИТЬ (ДЛЯ ВСЕХ)" : "🟢 ВКЛЮЧИТЬ (ДЛЯ ВСЕХ)", action: () => checkAdminAccess(toggleMaintenance) },
        { emoji: "🐣", name: "Все пользователи", desc: "Список всех", action: () => checkAdminAccess(() => showToast(`Пользователей: ${platformData.users.length}\n${platformData.users.map(u=>u.fullname).join(', ')}`)) },
        { emoji: "🚫🥚", name: "Заблокировать", desc: "Блокировка юзера", action: () => checkAdminAccess(() => { let name = prompt("Имя пользователя"); let u = platformData.users.find(u=>u.fullname.toLowerCase().includes(name.toLowerCase())); if(u && !u.isAdmin){ platformData.bannedUsers.push(u.id); saveData(); showToast(`Заблокирован ${u.fullname}`); renderUsersList(); } else showToast("Пользователь не найден"); }) },
        { emoji: "🔓🐣", name: "Разблокировать", desc: "Снять блок", action: () => checkAdminAccess(() => { if(platformData.bannedUsers.length){ platformData.bannedUsers.pop(); saveData(); showToast("Разблокирован"); renderUsersList();} else showToast("Нет заблокированных"); }) },
        { emoji: "📝🐰", name: "Создать пост", desc: "Пасхальное поздравление", action: () => checkAdminAccess(() => { 
            let text = prompt("Пасхальное поздравление 🥚"); 
            if(text){ platformData.posts.push({id:Date.now(), userId:currentUser.id, text: "🐣 " + text + " 🥚", time:new Date().toISOString(), likes:0}); saveData(); renderFeed(); showToast("Пост создан!"); } 
        }) },
        { emoji: "🗑️", name: "Удалить пост", desc: "По ID", action: () => checkAdminAccess(() => { let id = prompt("ID поста"); let idx = platformData.posts.findIndex(p=>p.id==id); if(idx>=0){ platformData.posts.splice(idx,1); saveData(); renderFeed(); showToast("Удалено"); } }) },
        { emoji: "📸", name: "Удалить историю", desc: "Последнюю", action: () => checkAdminAccess(() => { if(platformData.stories.length){ platformData.stories.shift(); saveData(); renderStories(); showToast("История удалена"); } }) },
        { emoji: "✏️", name: "Изменить имя", desc: "Своё имя", action: () => checkAdminAccess(() => { let n = prompt("Новое имя", currentUser.fullname); if(n){ currentUser.fullname=n + " 🐣"; currentUser.avatar="🐰"; saveData(); renderProfile(); renderFeed(); showToast("Имя изменено"); } }) },
        { emoji: "💬", name: "Глобальный чат", desc: "Всем пасхальное поздравление", action: () => checkAdminAccess(() => { 
            let msg = prompt("Пасхальное поздравление всем 🥚"); 
            if(msg){ 
                platformData.users.forEach(u => { 
                    if(u.id !== currentUser.id){ 
                        const key=getChatKey(currentUser.id,u.id); 
                        if(!platformData.privateMessages[key])platformData.privateMessages[key]=[]; 
                        platformData.privateMessages[key].push({id:Date.now(), senderId:currentUser.id, text:`🐣 [ПАСХА] ${msg} 🥚`, time:new Date().toISOString(), read:false}); 
                    } 
                }); 
                saveData(); 
                showToast("Отправлено всем! Христос Воскресе!"); 
            } 
        }) },
        { emoji: "🎁", name: "Бонус всем", desc: "+100 лайков", action: () => checkAdminAccess(() => { 
            platformData.posts.forEach(p => { p.likes = (p.likes || 0) + 100; }); 
            saveData(); 
            renderFeed(); 
            showToast("Пасхальный бонус начислен!"); 
        }) },
        { emoji: "📊", name: "Статистика", desc: "Полный отчёт", action: () => checkAdminAccess(() => { showToast(`📊 Постов:${platformData.posts.length} Историй:${platformData.stories.length} Юзеров:${platformData.users.length} Техработы:${platformData.maintenanceMode?"ВКЛ":"ВЫКЛ"} 🐣`); }) }
    ];

    function renderAdminPanel() {
        adminFunctions[0].desc = platformData.maintenanceMode ? "🔴 ВЫКЛЮЧИТЬ (ДЛЯ ВСЕХ)" : "🟢 ВКЛЮЧИТЬ (ДЛЯ ВСЕХ)";
        const container = document.getElementById('adminGrid');
        container.innerHTML = adminFunctions.map(f => `
            <div class="admin-card" data-action="${f.name}">
                <div class="emoji">${f.emoji}</div>
                <div class="title">${f.name}</div>
                <div class="desc">${f.desc}</div>
            </div>
        `).join('');
        
        document.querySelectorAll('.admin-card').forEach((card, idx) => {
            card.onclick = () => adminFunctions[idx].action();
        });
    }

    // ========== НАВИГАЦИЯ ==========
    function switchPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
        document.getElementById(`${pageId}Page`).classList.add('active-page');
        document.querySelectorAll('.nav-item').forEach(btn => btn.classList.remove('active'));
        const targetBtn = document.querySelector(`[data-page="${pageId}"]`);
        if (targetBtn) targetBtn.classList.add('active');
        
        if (pageId === 'feed') { renderFeed(); renderStories(); }
        if (pageId === 'messages') renderUsersList();
        if (pageId === 'admin' && currentUser?.isAdmin) renderAdminPanel();
        if (pageId === 'profile') renderProfile();
        
        updateMaintenanceUI();
    }

    // ========== ОБРАБОТЧИКИ ==========
    document.getElementById('closeChatBtn')?.addEventListener('click', () => {
        document.getElementById('chatWindow').style.display = 'none';
        if (currentChatPartner) {
            markMessagesAsRead(currentChatPartner.id);
        }
        currentChatPartner = null;
    });
    
    document.getElementById('sendChatBtn')?.addEventListener('click', () => {
        const input = document.getElementById('chatMessageInput');
        if (input.value.trim() && currentChatPartner) {
            sendMessage(currentChatPartner.id, input.value.trim());
            input.value = '';
        }
    });
    
    document.getElementById('chatMessageInput')?.addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') document.getElementById('sendChatBtn').click(); 
    });
    
    document.getElementById('logoutBtn')?.addEventListener('click', logout);
    document.querySelectorAll('.nav-item').forEach(btn => btn.addEventListener('click', () => switchPage(btn.dataset.page)));
    
    document.getElementById('showRegisterBtn')?.addEventListener('click', () => {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('registerForm').style.display = 'block';
    });
    document.getElementById('showLoginBtn')?.addEventListener('click', () => {
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    });
    document.getElementById('doLoginBtn')?.addEventListener('click', login);
    document.getElementById('doRegisterBtn')?.addEventListener('click', register);
    
    // Стикеры
    let stickerPanelVisible = false;
    document.getElementById('showStickersBtn')?.addEventListener('click', () => {
        const panel = document.getElementById('stickerPanel');
        stickerPanelVisible = !stickerPanelVisible;
        panel.style.display = stickerPanelVisible ? 'flex' : 'none';
    });
    document.querySelectorAll('.easter-sticker').forEach(sticker => {
        sticker.addEventListener('click', () => {
            const stickerText = sticker.dataset.sticker;
            const input = document.getElementById('chatMessageInput');
            input.value += stickerText + ' ';
            document.getElementById('stickerPanel').style.display = 'none';
            stickerPanelVisible = false;
            input.focus();
        });
    });
    
    document.getElementById('selectPhotoBtn')?.addEventListener('click', () => document.getElementById('photoStoryInput').click());
    document.getElementById('selectVideoBtn')?.addEventListener('click', () => document.getElementById('videoStoryInput').click());
    document.getElementById('selectTextBtn')?.addEventListener('click', () => {
        const text = prompt("Введите пасхальное поздравление:");
        if (text) addStory('text', null, "🐣 " + text + " 🥚");
        document.getElementById('storyModal').style.display = 'none';
    });
    document.getElementById('cancelStoryBtn')?.addEventListener('click', () => document.getElementById('storyModal').style.display = 'none');
    document.getElementById('closeStoryBtn')?.addEventListener('click', () => {
        document.getElementById('storyViewer').style.display = 'none';
        const video = document.getElementById('storyVideoView');
        if (video) video.pause();
    });
    document.getElementById('photoStoryInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { addStory('image', ev.target.result, ''); document.getElementById('storyModal').style.display = 'none'; };
            reader.readAsDataURL(file);
        }
    });
    document.getElementById('videoStoryInput')?.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => { addStory('video', ev.target.result, ''); document.getElementById('storyModal').style.display = 'none'; };
            reader.readAsDataURL(file);
        }
    });

    // Делаем функции глобальными
    window.toggleLike = toggleLike;
    window.addComment = addComment;
    window.toggleComments = toggleComments;

    // ========== ЗАПУСК ==========
    deviceId = getDeviceId();
    loadData();
    
    setInterval(() => {
        if (currentUser) {
            currentUser.isOnline = true;
            currentUser.lastSeen = new Date().toISOString();
            saveData();
            updateOnlineCount();
            if (document.getElementById('messagesPage').classList.contains('active-page')) renderUsersList();
            if (document.getElementById('profilePage').classList.contains('active-page')) renderProfile();
        }
    }, 30000);
    
    if (!checkAutoLogin()) {
        document.getElementById('authContainer').style.display = 'flex';
        document.getElementById('mainApp').style.display = 'none';
        document.getElementById('loginForm').style.display = 'block';
        document.getElementById('registerForm').style.display = 'none';
    }
</script>
</body>
</html>
